{% extends "_layout.html" %}
{% block content %}
<!-- 时间范围切换 -->
<div class="flex items-center gap-2 mb-4">
  <span class="text-xs text-gray-500 mr-1">时间范围</span>
  <akm-range-tabs id="dashboard-days"></akm-range-tabs>
  <span id="stat-cached-at" class="text-xs text-gray-600 ml-auto">—</span>
</div>
<!-- 统计概览 -->
<!-- 骨架屏 -->
<div id="dashboard-skeleton">
  <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
    <div class="bg-surface-light border border-border rounded-lg p-4"><div class="skeleton h-3 w-12 mb-3"></div><div class="skeleton h-7 w-20"></div></div>
    <div class="bg-surface-light border border-border rounded-lg p-4"><div class="skeleton h-3 w-14 mb-3"></div><div class="skeleton h-7 w-24"></div></div>
    <div class="bg-surface-light border border-border rounded-lg p-4"><div class="skeleton h-3 w-14 mb-3"></div><div class="skeleton h-7 w-24"></div></div>
    <div class="bg-surface-light border border-border rounded-lg p-4"><div class="skeleton h-3 w-14 mb-3"></div><div class="skeleton h-7 w-24"></div></div>
    <div class="bg-surface-light border border-border rounded-lg p-4"><div class="skeleton h-3 w-20 mb-3"></div><div class="skeleton h-7 w-24"></div></div>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-surface-light border border-border rounded-lg overflow-hidden">
      <div class="px-4 py-3 border-b border-border"><div class="skeleton h-3 w-12"></div></div>
      <div class="p-4 space-y-3">
        <div class="skeleton h-4 w-full"></div><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-4 w-5/6"></div><div class="skeleton h-4 w-2/3"></div>
      </div>
    </div>
    <div class="bg-surface-light border border-border rounded-lg overflow-hidden">
      <div class="px-4 py-3 border-b border-border"><div class="skeleton h-3 w-12"></div></div>
      <div class="p-4 space-y-3">
        <div class="skeleton h-4 w-full"></div><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-4 w-5/6"></div><div class="skeleton h-4 w-2/3"></div>
      </div>
    </div>
  </div>
</div>

<!-- 真实内容（初始隐藏） -->
<div id="dashboard-content" class="hidden">
<div id="stats-cards" class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
  <div class="bg-surface-light border border-border rounded-lg p-4">
    <div class="text-xs text-gray-500 mb-1">总请求</div>
    <div id="stat-requests" class="text-2xl font-semibold text-white token-number">-</div>
  </div>
  <div class="bg-surface-light border border-border rounded-lg p-4">
    <div class="text-xs text-gray-500 mb-1">总 Token</div>
    <div id="stat-total" class="text-2xl font-semibold text-indigo-400 token-number">-</div>
  </div>
  <div class="bg-surface-light border border-border rounded-lg p-4">
    <div class="text-xs text-gray-500 mb-1">输入 Token</div>
    <div id="stat-prompt" class="text-2xl font-semibold text-emerald-400 token-number">-</div>
  </div>
  <div class="bg-surface-light border border-border rounded-lg p-4">
    <div class="text-xs text-gray-500 mb-1">输出 Token</div>
    <div id="stat-completion" class="text-2xl font-semibold text-amber-400 token-number">-</div>
  </div>
  <div class="bg-surface-light border border-border rounded-lg p-4">
    <div class="text-xs text-gray-500 mb-1">缓存命中 Token</div>
    <div id="stat-cached" class="text-2xl font-semibold text-teal-400 token-number">-</div>
  </div>
</div>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <div class="bg-surface-light border border-border rounded-lg overflow-hidden">
    <div class="px-4 py-3 border-b border-border text-xs font-medium text-gray-400">按 Key</div>
    <div class="overflow-x-auto"><table class="w-full text-sm table-fixed"><colgroup><col style="width:45%"><col style="width:11%"><col style="width:11%"><col style="width:11%"><col style="width:11%"><col style="width:11%"></colgroup><tbody id="tbl-provider"></tbody></table></div>
  </div>
  <div class="bg-surface-light border border-border rounded-lg overflow-hidden">
    <div class="px-4 py-3 border-b border-border text-xs font-medium text-gray-400">按模型</div>
    <div class="overflow-x-auto"><table class="w-full text-sm table-fixed"><colgroup><col style="width:45%"><col style="width:11%"><col style="width:11%"><col style="width:11%"><col style="width:11%"><col style="width:11%"></colgroup><tbody id="tbl-model"></tbody></table></div>
  </div>
</div>
<div id="daily-section" class="mt-6 bg-surface-light border border-border rounded-lg overflow-hidden hidden">
  <div class="px-4 py-3 border-b border-border text-xs font-medium text-gray-400">每日用量</div>
  <div class="">
    <table class="w-full text-sm table-fixed">
      <thead><tr class="text-gray-500 text-xs"><th class="text-left px-4 py-2 font-medium w-28">日期</th><th class="text-right px-4 py-2 font-medium">请求</th><th class="text-right px-4 py-2 font-medium">总计</th><th class="text-right px-4 py-2 font-medium">输入</th><th class="text-right px-4 py-2 font-medium">输出</th><th class="text-right px-4 py-2 font-medium">缓存</th></tr></thead>
      <tbody id="tbl-daily"></tbody>
    </table>
  </div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtNum(n) {
  if (n == null) return '-';
  if (n < 1000) return n.toString();
  if (n < 1000000) return (n / 1000).toFixed(2) + 'K';
  return (n / 1000000).toFixed(2) + 'M';
}

var _currentDays = 1;
var DASHBOARD_DAYS_KEY = 'akm_dashboard_days';

function loadDaysFilter() {
  if (window.__akmDashboardInitialDays === 1 || window.__akmDashboardInitialDays === 7 || window.__akmDashboardInitialDays === 30) {
    _currentDays = window.__akmDashboardInitialDays;
    return;
  }
  try {
    var saved = parseInt(localStorage.getItem(DASHBOARD_DAYS_KEY) || '1', 10);
    if (saved === 1 || saved === 7 || saved === 30) {
      _currentDays = saved;
    }
  } catch (e) {}
}

function saveDaysFilter() {
  try {
    localStorage.setItem(DASHBOARD_DAYS_KEY, String(_currentDays));
  } catch (e) {}
}

function switchDays(d) {
  _currentDays = d;
  saveDaysFilter();
  var tabs = document.getElementById('dashboard-days');
  if (tabs && typeof tabs.setOptions === 'function') {
    tabs.setOptions([
      { value: 1, label: '1d' },
      { value: 7, label: '7d' },
      { value: 30, label: '30d' }
    ], _currentDays, 'switchDays');
  }
  loadDashboard();
}

async function loadDashboard() {
  // 显示骨架屏，隐藏真实内容
  document.getElementById('dashboard-skeleton').classList.remove('hidden');
  document.getElementById('dashboard-content').classList.add('hidden');
  try {
    var res = await fetch('/api/stats?days=' + _currentDays);
    var s = await res.json();
    document.getElementById('stat-requests').textContent = s.total_requests.toLocaleString();
    document.getElementById('stat-total').textContent = fmtNum(s.total_tokens);
    document.getElementById('stat-prompt').textContent = fmtNum(s.total_prompt_tokens);
    document.getElementById('stat-completion').textContent = fmtNum(s.total_completion_tokens);
    document.getElementById('stat-cached').textContent = fmtNum(s.total_cached_tokens || 0);
    document.getElementById('stat-cached-at').textContent = s.cached_at ? '更新时间 ' + s.cached_at : '';

    var html = '';
    Object.entries(s.by_key||{}).sort(function(a,b){return b[1].total-a[1].total}).forEach(function(e){
      var k=e[0], v=e[1];
      html += '<tr class="border-t border-border hover:bg-surface-hover"><td class="px-4 py-2 text-xs text-gray-300 truncate" title="'+esc(k)+'">'+esc(k)+'</td><td class="px-4 py-2 text-xs text-right text-gray-500 whitespace-nowrap">'+v.requests+'次</td><td class="px-4 py-2 text-xs text-right text-indigo-300">'+fmtNum(v.total)+'</td><td class="px-4 py-2 text-xs text-right text-gray-400">'+fmtNum(v.prompt)+'</td><td class="px-4 py-2 text-xs text-right text-gray-400">'+fmtNum(v.completion)+'</td><td class="px-4 py-2 text-xs text-right text-teal-400">'+fmtNum(v.cached||0)+'</td></tr>';
    });
    document.getElementById('tbl-provider').innerHTML = html || '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-600 text-xs">暂无数据</td></tr>';

    html = '';
    Object.entries(s.by_model||{}).sort(function(a,b){return b[1].total-a[1].total}).forEach(function(e){
      var k=e[0], v=e[1];
      html += '<tr class="border-t border-border hover:bg-surface-hover"><td class="px-4 py-2 text-xs text-gray-300 truncate" title="'+esc(k)+'">'+esc(k)+'</td><td class="px-4 py-2 text-xs text-right text-gray-500 whitespace-nowrap">'+v.requests+'次</td><td class="px-4 py-2 text-xs text-right text-indigo-300">'+fmtNum(v.total)+'</td><td class="px-4 py-2 text-xs text-right text-gray-400">'+fmtNum(v.prompt)+'</td><td class="px-4 py-2 text-xs text-right text-gray-400">'+fmtNum(v.completion)+'</td><td class="px-4 py-2 text-xs text-right text-teal-400">'+fmtNum(v.cached||0)+'</td></tr>';
    });
    document.getElementById('tbl-model').innerHTML = html || '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-600 text-xs">暂无数据</td></tr>';

    var dailyEntries = Object.entries(s.daily||{});
    document.getElementById('daily-section').classList.toggle('hidden', dailyEntries.length === 0);
    html = '';
    dailyEntries.forEach(function(e){
      var k=e[0], v=e[1];
      html += '<tr class="border-t border-border hover:bg-surface-hover"><td class="px-4 py-2 text-xs text-gray-300">'+k+'</td><td class="px-4 py-2 text-xs text-right text-gray-500">'+v.requests+'</td><td class="px-4 py-2 text-xs text-right text-indigo-300">'+fmtNum(v.total)+'</td><td class="px-4 py-2 text-xs text-right text-gray-400">'+fmtNum(v.prompt)+'</td><td class="px-4 py-2 text-xs text-right text-gray-400">'+fmtNum(v.completion)+'</td><td class="px-4 py-2 text-xs text-right text-teal-400">'+fmtNum(v.cached||0)+'</td></tr>';
    });
    document.getElementById('tbl-daily').innerHTML = html;
    // 数据加载完成，隐藏骨架屏
    document.getElementById('dashboard-skeleton').classList.add('hidden');
    document.getElementById('dashboard-content').classList.remove('hidden');
  } catch(e) { console.error('Dashboard:', e); }
}

document.addEventListener('DOMContentLoaded', function() {
  loadDaysFilter();
  var tabs = document.getElementById('dashboard-days');
  if (tabs && typeof tabs.setOptions === 'function') {
    tabs.setOptions([
      { value: 1, label: '1d' },
      { value: 7, label: '7d' },
      { value: 30, label: '30d' }
    ], _currentDays, 'switchDays');
  }
  switchDays(_currentDays);

  // 当管理台页面曾切到后台、随后再次回到前台时，重新拉取一次统计数据。
  // 这样可以避免用户长时间停留在其他标签页后返回统计页时仍看到旧数据，
  // 同时只在页面真正变为可见时触发，避免后台标签页继续发起无意义请求。
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') {
      loadDashboard();
    }
  });
});
</script>
{% endblock %}
