<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/logo.png?v={{ asset_version }}">
<title>AKM - {{ title }}</title>
<script src="/static/tailwindcss.js"></script>
<script src="/static/marked.min.js"></script>
<script src="/static/akm-ui.js"></script>
<script>
try {
  if (localStorage.getItem('akm.sidebar.collapsed') === '1') {
    document.documentElement.classList.add('sidebar-collapsed');
  }
} catch (e) {}

tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        surface: { DEFAULT: '#1e1e2e', light: '#262637', hover: '#2d2d40' },
        border: { DEFAULT: '#33334d', light: '#404060' },
      }
    }
  }
}
</script>
{% include "_styles.html" %}
</head>
<body class="bg-surface text-gray-200 h-screen flex overflow-hidden">
{% include "_sidebar.html" %}
<div class="flex-1 flex flex-col min-w-0 overflow-hidden">
{% include "_header.html" %}
<main class="flex-1 overflow-y-auto p-6">
{% block content %}{% endblock %}
</main>
</div>
{% block extra_html %}{% endblock %}
{% block extra_js %}{% endblock %}
{% include "_toggle_sidebar.html" %}
</body>
</html>
