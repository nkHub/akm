{% extends "_layout.html" %}
{% block content %}
<div class="space-y-6">

  <!-- 提示 -->
  <div class="bg-amber-400/10 border border-amber-400/30 rounded-lg p-3 flex items-center gap-2">
    <svg class="w-4 h-4 text-amber-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
    <p class="text-xs text-amber-300">插件启用/禁用/安装后，需<b>手动重启 akm 服务</b>才能生效。</p>
  </div>

  <!-- 上传区域 -->
  <section>
    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">安装插件</h3>
    <div class="bg-surface-light border border-border rounded-lg p-4">
      <div class="flex items-center gap-4">
        <label class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded cursor-pointer transition-colors">
          选择 .zip 文件
          <input type="file" id="plugin-file" accept=".zip" class="hidden" onchange="uploadPlugin()">
        </label>
        <span id="upload-status" class="text-xs text-gray-400">支持 .zip 格式，自动解压到 ~/.akm/plugins/</span>
      </div>
    </div>
  </section>

  <!-- 插件列表 -->
  <section>
    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">已加载插件 (<span id="plugin-count">0</span>)</h3>
    <div id="plugin-list" class="space-y-2">
      <div class="text-xs text-gray-500">加载中...</div>
    </div>
  </section>

</div>
{% endblock %}

{% block extra_js %}
<script>
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pluginRoute(name) { return '/plugins/' + encodeURIComponent(name || ''); }

var _plugins = [];
var DATA_FILTER_GUARD_TEMPLATES = {
  command_risk: {
    enabled: true,
    enable_response_guard: true,
    response_guard_mode: 'block',
    response_block_patterns: [
      '(?i)rm\\s+-rf\\s+/',
      '(?i)curl\\s+[^\\n|]+\\|\\s*(bash|sh)',
      '(?i)wget\\s+[^\\n|]+\\|\\s*(bash|sh)',
      '(?i)powershell\\s+-enc\\b',
      '(?i)chmod\\s+\\+x\\s+.+&&\\s*\\./'
    ].join('\n'),
    response_rule_actions: ''
  },
  credential_risk: {
    enabled: true,
    sensitive_fields: 'api_key,authorization,password,secret,token,access_token,refresh_token,cookie,set-cookie',
    regex_rules: [
      'sk-[A-Za-z0-9_-]{12,}=>[API-KEY]',
      '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}=>[EMAIL]',
      '1[3-9]\\d{9}=>[PHONE]'
    ].join('\n'),
    request_text_paths: 'messages[].content,input,instructions'
  },
  prompt_injection: {
    enabled: true,
    enable_response_guard: true,
    response_guard_mode: 'warn',
    response_block_patterns: [
      '(?i)ignore\\s+(all\\s+)?previous\\s+instructions',
      '(?i)reveal\\s+(the\\s+)?system\\s+prompt',
      '(?i)dump\\s+all\\s+secrets',
      '(?i)bypass\\s+safety'
    ].join('\n'),
    response_rule_actions: [
      '(?i)ignore\\s+(all\\s+)?previous\\s+instructions=>warn',
      '(?i)reveal\\s+(the\\s+)?system\\s+prompt=>warn',
      '(?i)dump\\s+all\\s+secrets=>block',
      '(?i)bypass\\s+safety=>warn'
    ].join('\n')
  }
};
var DATA_FILTER_STRUCTURED_KEYS = {
  keyword_rules: true,
  regex_rules: true,
  response_block_patterns: true,
  response_rule_actions: true
};

function getSettingValue(def, current) {
  if (current !== undefined && current !== null) return current;
  return def.default;
}

function parseSimpleRulePairs(raw, separator) {
  var rows = [];
  String(raw || '').replace(/\r/g, '\n').split('\n').forEach(function(line){
    var item = line.trim();
    if (!item || item.indexOf(separator) < 0) return;
    var idx = item.indexOf(separator);
    var left = item.slice(0, idx).trim();
    var right = item.slice(idx + separator.length).trim();
    if (left) rows.push({left:left, right:right});
  });
  return rows;
}

function parseResponseRuleRows(patternsRaw, actionsRaw) {
  var actionsMap = {};
  String(actionsRaw || '').replace(/\r/g, '\n').split('\n').forEach(function(line){
    var item = line.trim();
    if (!item || item.indexOf('=>') < 0) return;
    var idx = item.lastIndexOf('=>');
    var pattern = item.slice(0, idx).trim();
    var action = item.slice(idx + 2).trim().toLowerCase();
    if (pattern && action) actionsMap[pattern] = action;
  });
  var rows = [];
  String(patternsRaw || '').replace(/\r/g, '\n').split('\n').forEach(function(line){
    var pattern = line.trim();
    if (!pattern) return;
    rows.push({pattern: pattern, action: actionsMap[pattern] || 'default'});
  });
  return rows;
}

function renderDataFilterRuleRow(type, row) {
  if (type === 'keyword') {
    return '<div class="grid grid-cols-[1fr_auto_1fr_auto] gap-2 items-center mb-2 data-filter-row" data-row-type="keyword">'
      + '<input type="text" data-col="left" value="' + esc(row.left || '') + '" placeholder="原词" class="w-full bg-surface border border-border rounded px-2 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">'
      + '<span class="text-xs text-gray-500">=</span>'
      + '<input type="text" data-col="right" value="' + esc(row.right || '') + '" placeholder="替换词" class="w-full bg-surface border border-border rounded px-2 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">'
      + '<button type="button" onclick="removeDataFilterRuleRow(this)" class="text-red-400 hover:text-red-300 text-xs cursor-pointer">删除</button>'
      + '</div>';
  }
  if (type === 'regex') {
    return '<div class="grid grid-cols-[1fr_auto_1fr_auto] gap-2 items-center mb-2 data-filter-row" data-row-type="regex">'
      + '<input type="text" data-col="left" value="' + esc(row.left || '') + '" placeholder="正则" class="w-full bg-surface border border-border rounded px-2 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">'
      + '<span class="text-xs text-gray-500">=&gt;</span>'
      + '<input type="text" data-col="right" value="' + esc(row.right || '') + '" placeholder="替换词" class="w-full bg-surface border border-border rounded px-2 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">'
      + '<button type="button" onclick="removeDataFilterRuleRow(this)" class="text-red-400 hover:text-red-300 text-xs cursor-pointer">删除</button>'
      + '</div>';
  }
  return '<div class="grid grid-cols-[1fr_110px_auto] gap-2 items-center mb-2 data-filter-row" data-row-type="response">'
    + '<input type="text" data-col="pattern" value="' + esc(row.pattern || '') + '" placeholder="高风险正则" class="w-full bg-surface border border-border rounded px-2 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">'
    + '<select data-col="action" class="w-full bg-surface border border-border rounded px-2 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">'
    + '<option value="default"' + ((row.action || 'default') === 'default' ? ' selected' : '') + '>跟随全局</option>'
    + '<option value="warn"' + (row.action === 'warn' ? ' selected' : '') + '>warn</option>'
    + '<option value="mask"' + (row.action === 'mask' ? ' selected' : '') + '>mask</option>'
    + '<option value="block"' + (row.action === 'block' ? ' selected' : '') + '>block</option>'
    + '</select>'
    + '<button type="button" onclick="removeDataFilterRuleRow(this)" class="text-red-400 hover:text-red-300 text-xs cursor-pointer">删除</button>'
    + '</div>';
}

function renderDataFilterStructuredEditor(p) {
  var cfg = p.config || {};
  var name = esc(p.name);
  var keywordRows = parseSimpleRulePairs(cfg.keyword_rules || '', '=');
  var regexRows = parseSimpleRulePairs(cfg.regex_rules || '', '=>');
  var responseRows = parseResponseRuleRows(cfg.response_block_patterns || '', cfg.response_rule_actions || '');
  if (!keywordRows.length) keywordRows = [{left:'', right:''}];
  if (!regexRows.length) regexRows = [{left:'', right:''}];
  if (!responseRows.length) responseRows = [{pattern:'', action:'default'}];

  var html = '<div class="mb-3">';
  html += '<div class="text-xs text-gray-400 mb-1">安全模板</div>';
  html += '<div class="flex flex-wrap gap-2">';
  html += '<button type="button" onclick="applyDataFilterTemplate(\'' + name + '\', \'command_risk\')" class="bg-surface border border-border hover:border-indigo-500 text-gray-300 text-xs px-2.5 py-1 rounded cursor-pointer">命令执行风险</button>';
  html += '<button type="button" onclick="applyDataFilterTemplate(\'' + name + '\', \'credential_risk\')" class="bg-surface border border-border hover:border-indigo-500 text-gray-300 text-xs px-2.5 py-1 rounded cursor-pointer">凭据泄露风险</button>';
  html += '<button type="button" onclick="applyDataFilterTemplate(\'' + name + '\', \'prompt_injection\')" class="bg-surface border border-border hover:border-indigo-500 text-gray-300 text-xs px-2.5 py-1 rounded cursor-pointer">提示词注入</button>';
  html += '</div></div>';

  html += '<div class="mb-3"><div class="text-xs text-gray-300 mb-1">关键词替换规则</div><div id="dfg-keyword-rows-' + name + '">';
  keywordRows.forEach(function(row){ html += renderDataFilterRuleRow('keyword', row); });
  html += '</div><button type="button" onclick="addDataFilterRuleRow(\'' + name + '\', \'keyword\')" class="text-xs text-indigo-400 hover:text-indigo-300 cursor-pointer">+ 添加关键词规则</button></div>';

  html += '<div class="mb-3"><div class="text-xs text-gray-300 mb-1">正则替换规则</div><div id="dfg-regex-rows-' + name + '">';
  regexRows.forEach(function(row){ html += renderDataFilterRuleRow('regex', row); });
  html += '</div><button type="button" onclick="addDataFilterRuleRow(\'' + name + '\', \'regex\')" class="text-xs text-indigo-400 hover:text-indigo-300 cursor-pointer">+ 添加正则规则</button></div>';

  html += '<div class="mb-3"><div class="text-xs text-gray-300 mb-1">响应风险规则</div><div id="dfg-response-rows-' + name + '">';
  responseRows.forEach(function(row){ html += renderDataFilterRuleRow('response', row); });
  html += '</div><button type="button" onclick="addDataFilterRuleRow(\'' + name + '\', \'response\')" class="text-xs text-indigo-400 hover:text-indigo-300 cursor-pointer">+ 添加响应规则</button></div>';

  html += '<textarea data-plugin="' + name + '" data-key="keyword_rules" data-type="text" class="hidden">' + esc(cfg.keyword_rules || '') + '</textarea>';
  html += '<textarea data-plugin="' + name + '" data-key="regex_rules" data-type="text" class="hidden">' + esc(cfg.regex_rules || '') + '</textarea>';
  html += '<textarea data-plugin="' + name + '" data-key="response_block_patterns" data-type="text" class="hidden">' + esc(cfg.response_block_patterns || '') + '</textarea>';
  html += '<textarea data-plugin="' + name + '" data-key="response_rule_actions" data-type="text" class="hidden">' + esc(cfg.response_rule_actions || '') + '</textarea>';
  return html;
}

function rerenderDataFilterStructuredEditor(pluginName) {
  var plugin = (_plugins || []).find(function(item){ return item.name === pluginName; });
  if (!plugin) return;
  var host = document.getElementById('dfg-structured-' + pluginName);
  if (!host) return;
  host.innerHTML = renderDataFilterStructuredEditor(plugin);
}

function renderPluginSettings(p) {
  if (!p.settings || !p.settings.length) return '';
  var html = '<details class="pt-3"><summary class="text-xs text-gray-400 mb-2 cursor-pointer select-none">配置</summary><div class="mt-2">';
  if (p.name === 'data_filter_guard') html += '<div id="dfg-structured-' + esc(p.name) + '">' + renderDataFilterStructuredEditor(p) + '</div>';
  p.settings.forEach(function(def){
    if (p.name === 'data_filter_guard' && DATA_FILTER_STRUCTURED_KEYS[def.key]) return;
    var value = getSettingValue(def, p.config ? p.config[def.key] : undefined);
    html += '<label class="block mb-2">';
    if (def.type === 'boolean') {
      html += '<div class="flex items-center justify-between gap-3">';
      html += '<span class="text-xs text-gray-300 leading-5">' + esc(def.label || def.key) + '</span>';
      html += '<input data-plugin="' + esc(p.name) + '" data-key="' + esc(def.key) + '" data-type="boolean" type="checkbox" class="shrink-0" ' + (value ? 'checked' : '') + '>';
      html += '</div>';
    } else if (def.type === 'text') {
      html += '<div class="text-xs text-gray-300 mb-1">' + esc(def.label || def.key) + '</div>';
      html += '<textarea data-plugin="' + esc(p.name) + '" data-key="' + esc(def.key) + '" data-type="text" rows="3" class="w-full bg-surface border border-border rounded px-3 py-2 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">' + esc(value || '') + '</textarea>';
    } else if (def.type === 'number') {
      html += '<div class="text-xs text-gray-300 mb-1">' + esc(def.label || def.key) + '</div>';
      html += '<input data-plugin="' + esc(p.name) + '" data-key="' + esc(def.key) + '" data-type="number" type="number" value="' + esc(value) + '" class="w-full bg-surface border border-border rounded px-3 py-2 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">';
    } else {
      html += '<div class="text-xs text-gray-300 mb-1">' + esc(def.label || def.key) + '</div>';
      html += '<input data-plugin="' + esc(p.name) + '" data-key="' + esc(def.key) + '" data-type="string" type="text" value="' + esc(value || '') + '" class="w-full bg-surface border border-border rounded px-3 py-2 text-xs text-gray-200 focus:outline-none focus:border-indigo-500">';
    }
    if (def.description) html += '<div class="text-[11px] text-gray-500 mt-1">' + esc(def.description) + '</div>';
    html += '</label>';
  });
  html += '<div class="flex items-center gap-2 mt-2">';
  html += '<button onclick="savePluginConfig(\'' + esc(p.name) + '\')" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded cursor-pointer">保存配置</button>';
  html += '<span id="plugin-config-msg-' + esc(p.name) + '" class="text-xs text-gray-500"></span>';
  html += '</div></div></details>';
  return html;
}

function applyDataFilterTemplate(pluginName, templateName) {
  var tpl = DATA_FILTER_GUARD_TEMPLATES[templateName];
  if (!tpl) return;
  var plugin = (_plugins || []).find(function(item){ return item.name === pluginName; });
  if (plugin) {
    plugin.config = plugin.config || {};
    Object.keys(tpl).forEach(function(key){ plugin.config[key] = tpl[key]; });
  }
  Object.keys(tpl).forEach(function(key){
    var node = document.querySelector('[data-plugin="' + pluginName + '"][data-key="' + key + '"]');
    if (!node) return;
    var type = node.getAttribute('data-type');
    if (type === 'boolean') node.checked = !!tpl[key];
    else node.value = tpl[key];
  });
  if (pluginName === 'data_filter_guard') rerenderDataFilterStructuredEditor(pluginName);
  var msg = document.getElementById('plugin-config-msg-' + pluginName);
  if (msg) {
    msg.textContent = '已填充模板，点击“保存配置”生效';
    msg.className = 'text-xs text-cyan-400';
  }
}

function addDataFilterRuleRow(pluginName, type) {
  var containerId = type === 'keyword' ? 'dfg-keyword-rows-' + pluginName : (type === 'regex' ? 'dfg-regex-rows-' + pluginName : 'dfg-response-rows-' + pluginName);
  var container = document.getElementById(containerId);
  if (!container) return;
  var row = type === 'response' ? {pattern:'', action:'default'} : {left:'', right:''};
  container.insertAdjacentHTML('beforeend', renderDataFilterRuleRow(type, row));
}

function removeDataFilterRuleRow(btn) {
  var row = btn.closest('.data-filter-row');
  if (row) row.remove();
}

function syncDataFilterGuardEditors(pluginName) {
  var keywordLines = [];
  document.querySelectorAll('#dfg-keyword-rows-' + pluginName + ' .data-filter-row').forEach(function(row){
    var left = (row.querySelector('[data-col="left"]') || {}).value || '';
    var right = (row.querySelector('[data-col="right"]') || {}).value || '';
    left = left.trim(); right = right.trim();
    if (left) keywordLines.push(left + '=' + right);
  });
  var regexLines = [];
  document.querySelectorAll('#dfg-regex-rows-' + pluginName + ' .data-filter-row').forEach(function(row){
    var left = (row.querySelector('[data-col="left"]') || {}).value || '';
    var right = (row.querySelector('[data-col="right"]') || {}).value || '';
    left = left.trim(); right = right.trim();
    if (left) regexLines.push(left + '=>' + right);
  });
  var responsePatterns = [];
  var responseActions = [];
  document.querySelectorAll('#dfg-response-rows-' + pluginName + ' .data-filter-row').forEach(function(row){
    var pattern = ((row.querySelector('[data-col="pattern"]') || {}).value || '').trim();
    var action = ((row.querySelector('[data-col="action"]') || {}).value || 'default').trim();
    if (!pattern) return;
    responsePatterns.push(pattern);
    if (action && action !== 'default') responseActions.push(pattern + '=>' + action);
  });
  var keywordNode = document.querySelector('[data-plugin="' + pluginName + '"][data-key="keyword_rules"]');
  var regexNode = document.querySelector('[data-plugin="' + pluginName + '"][data-key="regex_rules"]');
  var patternNode = document.querySelector('[data-plugin="' + pluginName + '"][data-key="response_block_patterns"]');
  var actionNode = document.querySelector('[data-plugin="' + pluginName + '"][data-key="response_rule_actions"]');
  if (keywordNode) keywordNode.value = keywordLines.join('\n');
  if (regexNode) regexNode.value = regexLines.join('\n');
  if (patternNode) patternNode.value = responsePatterns.join('\n');
  if (actionNode) actionNode.value = responseActions.join('\n');
}

function loadPlugins() {
  fetch('/api/plugins').then(function(r){return r.json()}).then(function(data){
    _plugins = data;
    fetchPluginConfigs(data).then(function(merged){
      _plugins = merged;
      document.getElementById('plugin-count').textContent = merged.length;
      renderPluginList(merged);
    });
  }).catch(function(e){
    document.getElementById('plugin-list').innerHTML = '<div class="text-xs text-red-400">加载失败: ' + esc(e.message) + '</div>';
  });
}

function fetchPluginConfigs(plugins) {
  return Promise.all(plugins.map(function(p){
    if (!p.settings || !p.settings.length) return Promise.resolve(p);
    return fetch('/api/plugin-config/' + encodeURIComponent(p.name))
      .then(function(r){ return r.ok ? r.json() : {}; })
      .then(function(cfg){ p.config = cfg || {}; return p; })
      .catch(function(){ p.config = {}; return p; });
  }));
}

function savePluginConfig(name) {
  var plugin = (_plugins || []).find(function(item){ return item.name === name; });
  if (!plugin) return;
  if (name === 'data_filter_guard') syncDataFilterGuardEditors(name);
  var nodes = document.querySelectorAll('[data-plugin="' + name.replace(/"/g, '&quot;') + '"]');
  var payload = {};
  nodes.forEach(function(node){
    var key = node.getAttribute('data-key');
    var type = node.getAttribute('data-type');
    if (type === 'boolean') payload[key] = !!node.checked;
    else if (type === 'number') payload[key] = Number(node.value || 0);
    else payload[key] = node.value;
  });
  var msg = document.getElementById('plugin-config-msg-' + name);
  msg.textContent = '保存中...';
  fetch('/api/plugin-config/' + encodeURIComponent(name), {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json().then(function(d){ return {ok: r.ok, body: d}; }); })
    .then(function(res){
      if (res.ok && res.body.ok) {
        msg.textContent = '已保存，当前进程立即生效';
        msg.className = 'text-xs text-emerald-400';
        loadPlugins();
      } else {
        msg.textContent = '保存失败';
        msg.className = 'text-xs text-red-400';
      }
    }).catch(function(){
      msg.textContent = '网络错误';
      msg.className = 'text-xs text-red-400';
    });
}

var CATEGORY_LABELS = {
  filter: '请求处理', matcher: '模型匹配', converter: '格式转换',
  handler: '错误处理', post: '响应处理', app: '应用插件'
};

function renderPluginList(plugins) {
  var html = '';
  if (plugins.length === 0) {
    html = '<div class="text-gray-600 text-sm">暂无插件</div>';
  } else {
    plugins.forEach(function(p) {
      var cat = CATEGORY_LABELS[p.category] || p.category || '未分类';
      var sourceBadge;
      if (p.builtin) {
        sourceBadge = '<span class="text-xs px-1.5 py-0.5 rounded bg-indigo-400/10 text-indigo-300">内置</span>';
      } else if (p.source === 'project') {
        sourceBadge = '<span class="text-xs px-1.5 py-0.5 rounded bg-cyan-400/10 text-cyan-300">本地</span>';
      } else {
        sourceBadge = '<span class="text-xs px-1.5 py-0.5 rounded bg-emerald-400/10 text-emerald-300">第三方</span>';
      }
      var requiredBadge = p.required
        ? '<span class="text-xs px-1.5 py-0.5 rounded bg-amber-400/10 text-amber-300">必需</span>'
        : '';
      var convertsInfo = '';
      if (p.converts) {
        var convertText = esc(p.converts.from) + ' → ' + esc(p.converts.to);
        if (p.has_menu && p.enabled) {
          convertsInfo = '<button type="button" class="text-xs px-1.5 py-0.5 rounded bg-surface border border-border text-gray-300 hover:text-white transition-colors cursor-pointer" onclick="window.location.href=\'' + pluginRoute(p.name) + '\'" title="进入插件页面">' + convertText + '</button>';
        } else if (p.has_menu) {
          convertsInfo = '<span class="text-xs px-1.5 py-0.5 rounded bg-surface border border-border text-gray-400" title="插件未启用，无法进入页面">' + convertText + '</span>';
        }
      }

      html += '<div class="bg-surface-light border border-border rounded-lg p-4">';
      html += '<div class="flex items-center justify-between">';
      html += '<div class="flex-1 min-w-0">';
      html += '<div class="flex items-center gap-2 mb-1">';
      html += '<h4 class="text-sm font-semibold text-white">' + esc(p.name) + '</h4>';
      html += sourceBadge + requiredBadge;
      html += '<span class="text-xs text-gray-500">v' + esc(p.version) + '</span>';
      html += '<span class="text-xs px-1.5 py-0.5 rounded bg-surface border border-border text-gray-400">' + esc(cat) + '</span>';
      html += convertsInfo;
      html += '</div>';
      if (p.description) {
        html += '<p class="text-xs text-gray-500">' + esc(p.description) + '</p>';
      }

      var hooks = [];
      if (p.hooks.on_request) hooks.push('on_request');
      if (p.hooks.on_key_selected) hooks.push('on_key_selected');
      if (p.hooks.on_upstream_error) hooks.push('on_upstream_error');
      if (p.hooks.on_response) hooks.push('on_response');
      if (hooks.length) {
        html += '<p class="text-xs text-gray-600 mt-1">Hooks: ' + hooks.join(', ') + (p.priority !== 100 ? ' (优先级: ' + p.priority + ')' : '') + '</p>';
      }
      html += '</div>';

      html += '<div class="flex items-center self-center gap-3 shrink-0 ml-4">';
      if (p.required) {
        html += '<span class="text-xs text-gray-500">系统必需</span>';
      } else {
        html += '<label class="flex items-center cursor-pointer select-none switch-' + (p.enabled ? 'on' : 'off') + '" onclick="togglePlugin(\'' + esc(p.name) + '\', ' + p.enabled + ')">';
        html += '<div class="switch-track ' + (p.enabled ? 'bg-indigo-600' : 'bg-gray-600') + ' flex items-center"><div class="switch-thumb bg-white"></div></div>';
        html += '</label>';
      }
      if (!p.builtin) {
        html += '<button onclick="deletePlugin(\'' + esc(p.name) + '\')" class="text-red-400 hover:text-red-300 text-xs cursor-pointer">删除</button>';
      }
      html += '</div>';

      html += '</div>';
      if (p.settings && p.settings.length) {
        html += '<div class="mt-3 pt-3 border-t border-border">';
        html += renderPluginSettings(p);
        html += '</div>';
      }
      html += '</div>';
    });
  }
  document.getElementById('plugin-list').innerHTML = html;
}

function togglePlugin(name, currentEnabled) {
  var endpoint = currentEnabled ? '/api/plugins/' + name + '/disable' : '/api/plugins/' + name + '/enable';
  fetch(endpoint, {method: 'POST'}).then(function(r){return r.json()}).then(function(data){
    if (data.ok) {
      loadPlugins();
    } else {
      alert(data.error || '操作失败');
    }
  }).catch(function(e){
    alert('网络错误: ' + e.message);
  });
}

function deletePlugin(name) {
  if (!confirm('确认删除插件 "' + name + '"？此操作不可撤销。')) return;
  fetch('/api/plugins/' + encodeURIComponent(name), {method: 'DELETE'}).then(function(r){return r.json()}).then(function(data){
    if (data.ok) {
      loadPlugins();
    } else {
      alert(data.error || '删除失败');
    }
  }).catch(function(e){
    alert('网络错误: ' + e.message);
  });
}

function uploadPlugin() {
  var fileInput = document.getElementById('plugin-file');
  var status = document.getElementById('upload-status');
  var file = fileInput.files[0];
  if (!file) return;

  status.textContent = '上传中...';
  status.className = 'text-xs text-gray-400';

  var formData = new FormData();
  formData.append('file', file);

  fetch('/api/plugins/upload', {method: 'POST', body: formData}).then(function(r){return r.json()}).then(function(data){
    if (data.ok) {
      status.textContent = data.message;
      status.className = 'text-xs text-emerald-400';
      fileInput.value = '';
    } else {
      status.textContent = data.error || '上传失败';
      status.className = 'text-xs text-red-400';
    }
  }).catch(function(e){
    status.textContent = '上传失败: ' + e.message;
    status.className = 'text-xs text-red-400';
  });
}

document.addEventListener('DOMContentLoaded', loadPlugins);
</script>
{% endblock %}
