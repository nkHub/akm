<script>
function toggleSidebar() {
  var sidebar = document.getElementById('sidebar');
  var labels = document.querySelectorAll('.sidebar-label');
  var full = document.querySelector('.sidebar-brand');
  var short = document.querySelector('.sidebar-brand-short');
  if (sidebar.style.width === '60px') {
    sidebar.style.width = '220px';
    labels.forEach(function(l) { l.style.display = ''; });
    full.classList.remove('hidden');
    short.classList.add('hidden');
  } else {
    sidebar.style.width = '60px';
    labels.forEach(function(l) { l.style.display = 'none'; });
    full.classList.add('hidden');
    short.classList.remove('hidden');
  }
}
</script>
