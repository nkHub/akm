{% extends "_layout.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4 flex-wrap gap-3">
  <div class="flex items-center gap-3">
    <!-- 自定义供应商下拉 -->
    <div class="relative" id="provider-dropdown">
      <button onclick="toggleProviderDropdown()"
              class="flex items-center justify-between gap-2 bg-surface-light border border-border hover:border-indigo-500 text-gray-300 text-sm rounded px-3 py-1.5 transition-colors cursor-pointer min-w-[140px]">
        <span id="provider-label">全部 Key</span>
        <svg class="w-3.5 h-3.5 text-gray-500 transition-transform" id="provider-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="provider-menu" class="hidden absolute top-full left-0 mt-1 w-48 bg-surface-light border border-border rounded-lg shadow-xl z-30 py-1 max-h-60 overflow-y-auto">
        <div class="px-3 py-1.5 text-xs text-gray-400">Key</div>
        <button onclick="selectAlias('')" data-alias=""
                class="w-full text-left px-3 py-1.5 text-sm text-indigo-400 bg-indigo-400/10 hover:bg-surface-hover transition-colors cursor-pointer flex items-center justify-between">
          <span>全部 Key</span>
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </button>
        <div id="provider-options"></div>
      </div>
    </div>
    <span id="log-count" class="text-xs text-gray-500"></span>
  </div>
  <div class="flex items-center gap-3">
    <label id="hide-empty-toggle" class="flex items-center gap-2 cursor-pointer select-none switch-on" onclick="toggleHideEmpty()">
      <span class="text-xs text-gray-400">仅对话</span>
      <div class="switch-track bg-indigo-600 flex items-center"><div class="switch-thumb bg-white"></div></div>
    </label>
    <button onclick="toggleOrder()" id="btn-order" class="bg-surface-light border border-border hover:border-indigo-500 text-gray-300 text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">↓ 倒序</button>
    <button onclick="toggleStatusFilter()" id="btn-status" class="bg-surface-light border border-border hover:border-indigo-500 text-gray-300 text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">成功</button>
    <button onclick="switchLogDays(1)" id="btn-log-1d" class="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">1天</button>
    <button onclick="switchLogDays(7)" id="btn-log-7d" class="bg-surface-light border border-border hover:border-indigo-500 text-gray-400 hover:text-gray-200 text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">7天</button>
    <button onclick="switchLogDays(30)" id="btn-log-30d" class="bg-surface-light border border-border hover:border-indigo-500 text-gray-400 hover:text-gray-200 text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">30天</button>
    <label id="auto-refresh-toggle" class="flex items-center gap-2 cursor-pointer select-none switch-off">
      <span class="text-xs text-gray-400">自动刷新</span>
      <div class="switch-track bg-gray-600 flex items-center"><div class="switch-thumb bg-white"></div></div>
      <span class="text-xs text-gray-500">5s</span>
    </label>
    <button onclick="refreshLogs(1)" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">刷新</button>
  </div>
</div>
<div id="log-table-container" class="rounded-lg border border-border overflow-x-auto"></div>
<div id="log-empty" class="hidden text-center py-16 text-gray-500">暂无日志</div>
<div id="log-pagination" class="flex items-center justify-center gap-2 mt-4 hidden"></div>
{% endblock %}

{% block extra_html %}
<div id="log-drawer-overlay" class="hidden fixed inset-0 z-40 bg-black/50" onclick="closeDrawer()"></div>
<div id="log-drawer" class="hidden fixed top-0 right-0 z-50 h-full w-full max-w-3xl bg-surface-light border-l border-border shadow-2xl flex flex-col" style="transform:translateX(100%); transition: transform 0.25s ease" style="transform:translateX(100%)">
  <div class="flex items-center justify-between px-4 py-3 border-b border-border shrink-0">
    <h3 id="drawer-title" class="text-sm font-semibold text-white"></h3>
    <button onclick="closeDrawer()" class="text-gray-400 hover:text-white transition-colors cursor-pointer">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="flex border-b border-border shrink-0">
    <button onclick="switchDrawerTab('chat')" id="dtab-chat" class="flex-1 px-4 py-2 text-xs text-indigo-400 border-b-2 border-indigo-400 transition-colors cursor-pointer bg-surface/50">对话视图</button>
    <button onclick="switchDrawerTab('request')" id="dtab-request" class="flex-1 px-4 py-2 text-xs text-gray-400 border-b-2 border-transparent transition-colors cursor-pointer">请求体</button>
    <button onclick="switchDrawerTab('response')" id="dtab-response" class="flex-1 px-4 py-2 text-xs text-gray-400 border-b-2 border-transparent transition-colors cursor-pointer">响应体</button>
  </div>
  <div class="flex-1 overflow-y-auto overflow-x-hidden p-4" id="drawer-content">
    <div id="drawer-chat" class="space-y-3"></div>
    <pre id="drawer-request" class="hidden text-xs text-gray-300 leading-relaxed whitespace-pre-wrap break-all"></pre>
    <pre id="drawer-response" class="hidden text-xs text-gray-300 leading-relaxed whitespace-pre-wrap break-all"></pre>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var _logsData = [];
var _totalLogs = 0;
var _pageSize = 10;
var _currentPage = 1;
var autoRefresh = false, refreshTimer = null;
var _currentProvider = '';
var _currentAlias = '';
var _providerDropdownOpen = false;
var _orderAsc = false;
var _hideEmpty = true;
var _statusFilter = 'success';  // success | failed
var _currentDays = 1;  // 0=全部, 默认1天

function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatJson(s) { if(!s)return''; try{return JSON.stringify(JSON.parse(s),null,2);}catch{return s;} }

// 筛选状态持久化
var FILTER_KEY = 'akm_log_filters';
function saveFilters() {
  try {
    localStorage.setItem(FILTER_KEY, JSON.stringify({
      status: _statusFilter,
      alias: _currentAlias,
      days: _currentDays,
      hideEmpty: _hideEmpty,
      orderAsc: _orderAsc
    }));
  } catch(e) {}
}
function loadFilters() {
  try {
    var saved = JSON.parse(localStorage.getItem(FILTER_KEY) || '{}');
    if (saved.status) _statusFilter = saved.status;
    if (saved.days !== undefined) _currentDays = saved.days;
    if (saved.hideEmpty !== undefined) _hideEmpty = saved.hideEmpty;
    if (saved.orderAsc !== undefined) _orderAsc = saved.orderAsc;
    if (saved.alias !== undefined) _currentAlias = saved.alias;
  } catch(e) {}
}

function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  var t = document.getElementById('auto-refresh-toggle');
  if (autoRefresh) { t.classList.add('switch-on'); t.classList.remove('switch-off'); t.querySelector('.switch-track').classList.replace('bg-gray-600','bg-indigo-600'); refreshTimer = setInterval(function(){refreshLogs(_currentPage);}, 5000); }
  else { t.classList.remove('switch-on'); t.classList.add('switch-off'); t.querySelector('.switch-track').classList.replace('bg-indigo-600','bg-gray-600'); clearInterval(refreshTimer); refreshTimer = null; }
}

async function refreshLogs(page) {
  _currentPage = page || 1;
  var offset = (_currentPage - 1) * _pageSize;
  var url = '/api/logs?limit=' + _pageSize + '&offset=' + offset;
  if (_currentProvider) url += '&provider=' + encodeURIComponent(_currentProvider);
  if (_currentAlias) url += '&key_alias=' + encodeURIComponent(_currentAlias);
  url += '&order=' + (_orderAsc ? 'ASC' : 'DESC');
  if (_hideEmpty) url += '&hide_empty=true';
  if (_statusFilter !== 'all') url += '&status=' + _statusFilter;
  if (_currentDays > 0) url += '&days=' + _currentDays;

  try {
    // 显示加载状态
    document.getElementById('log-table-container').innerHTML = '<div class="flex items-center justify-center py-16"><div class="flex items-center gap-2 text-gray-500 text-xs"><svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>加载中...</div></div>';
    var res = await fetch(url);
    var json = await res.json();
    _logsData = json.data || [];
    _totalLogs = json.total || 0;
    document.getElementById('log-count').textContent = '共 ' + _totalLogs + ' 条，第 ' + _currentPage + ' 页';
    renderLogTable();
    renderPagination();
  } catch(e) { console.error(e); }
}

function renderLogTable() {
  var container = document.getElementById('log-table-container');
  var empty = document.getElementById('log-empty');
  if (!_logsData.length) { container.innerHTML=''; empty.classList.remove('hidden'); document.getElementById('log-pagination').classList.add('hidden'); return; }
  empty.classList.add('hidden');

  var html = '<table class="w-full text-sm"><thead><tr class="bg-surface-light text-gray-400 text-xs"><th class="text-left px-4 py-2.5 font-medium w-40">时间</th><th class="text-left px-4 py-2.5 font-medium">Alias</th><th class="text-left px-4 py-2.5 font-medium">供应商</th><th class="text-left px-4 py-2.5 font-medium">模型</th><th class="text-center px-4 py-2.5 font-medium w-28">输入(缓存)</th><th class="text-center px-4 py-2.5 font-medium w-20">输出</th><th class="text-center px-4 py-2.5 font-medium w-20">状态</th><th class="text-right px-4 py-2.5 font-medium w-24">延迟</th><th class="text-center px-4 py-2.5 font-medium w-16">详情</th></tr></thead><tbody>';

  _logsData.forEach(function(log, i){
    var code = log.status_code;
    var sc = 'status-err';
    if (code>=200&&code<300) sc='status-2xx'; else if(code>=400&&code<500) sc='status-4xx'; else if(code>=500) sc='status-5xx';
    var lat = log.latency_ms||0;
    var ds = lat>=1000?(lat/1000).toFixed(1)+'s':lat+'ms';
    var dc = lat>5000?'text-red-400':lat>2000?'text-yellow-400':'text-gray-400';
    var hasBody = log.request_body||log.response_body;
    var pt = log.prompt_tokens || 0;
    var ct = log.completion_tokens || 0;
    var cached = log.cached_tokens || 0;
    var effectivePrompt = pt - cached;
    var promptHtml = pt > 0 ? '<span class="text-gray-300">'+effectivePrompt.toLocaleString()+'</span>' + (cached > 0 ? ' <span class="text-teal-400">(R'+cached.toLocaleString()+')</span>' : '') : '<span class="text-gray-600">-</span>';
    var completionHtml = ct > 0 ? '<span class="text-gray-300">'+ct.toLocaleString()+'</span>' : '<span class="text-gray-600">-</span>';

    html += '<tr class="border-t border-border hover:bg-surface-hover"><td class="px-4 py-2.5 text-gray-400 whitespace-nowrap text-xs">'+esc(log.timestamp||'-')+'</td><td class="px-4 py-2.5 text-indigo-300 font-medium text-xs">'+esc(log.key_alias||'-')+'</td><td class="px-4 py-2.5 text-gray-300 text-xs">'+esc(log.provider||'-')+'</td><td class="px-4 py-2.5 text-gray-400 text-xs">'+esc(log.model||'-')+'</td><td class="px-4 py-2.5 text-center text-xs">'+promptHtml+'</td><td class="px-4 py-2.5 text-center text-xs">'+completionHtml+'</td><td class="px-4 py-2.5 text-center"><span class="inline-block px-2 py-0.5 rounded text-xs font-medium '+sc+'">'+(code||'ERR')+'</span></td><td class="px-4 py-2.5 text-right text-xs '+dc+'">'+ds+'</td><td class="px-4 py-2.5 text-center">'+(hasBody?'<button onclick="openDrawer('+i+')" class="text-gray-400 hover:text-indigo-400 transition-colors cursor-pointer"><svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>':'<span class="text-gray-600">-</span>')+'</td></tr>';
    if (log.error) html += '<tr class="border-t border-border bg-red-950/20"><td colspan="9" class="px-4 py-1.5 text-xs text-red-400">'+esc(log.error)+'</td></tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderPagination() {
  var totalPages = Math.ceil(_totalLogs / _pageSize);
  var pg = document.getElementById('log-pagination');
  if (totalPages <= 1) { pg.classList.add('hidden'); return; }
  pg.classList.remove('hidden');

  var html = '';
  html += '<button onclick="refreshLogs(1)" class="px-2 py-1 text-xs rounded ' + (_currentPage===1?'text-gray-600 cursor-default':'text-gray-400 hover:text-white hover:bg-surface-light cursor-pointer') + '" ' + (_currentPage===1?'disabled':'') + '>首页</button>';
  html += '<button onclick="refreshLogs(' + (_currentPage-1) + ')" class="px-2 py-1 text-xs rounded ' + (_currentPage===1?'text-gray-600 cursor-default':'text-gray-400 hover:text-white hover:bg-surface-light cursor-pointer') + '" ' + (_currentPage===1?'disabled':'') + '>上一页</button>';

  // 页码下拉
  html += '<select onchange="refreshLogs(parseInt(this.value))" class="bg-surface-light border border-border rounded px-2 py-1 text-xs text-gray-300 cursor-pointer focus:outline-none focus:border-indigo-500">';
  for (var p = 1; p <= totalPages; p++) {
    html += '<option value="' + p + '"' + (p === _currentPage ? ' selected' : '') + '>第 ' + p + ' 页</option>';
  }
  html += '</select>';

  html += '<button onclick="refreshLogs(' + (_currentPage+1) + ')" class="px-2 py-1 text-xs rounded ' + (_currentPage===totalPages?'text-gray-600 cursor-default':'text-gray-400 hover:text-white hover:bg-surface-light cursor-pointer') + '" ' + (_currentPage===totalPages?'disabled':'') + '>下一页</button>';
  html += '<button onclick="refreshLogs(' + totalPages + ')" class="px-2 py-1 text-xs rounded ' + (_currentPage===totalPages?'text-gray-600 cursor-default':'text-gray-400 hover:text-white hover:bg-surface-light cursor-pointer') + '" ' + (_currentPage===totalPages?'disabled':'') + '>末页</button>';
  html += '<span class="text-xs text-gray-500 ml-2">共 ' + totalPages + ' 页</span>';
  pg.innerHTML = html;
}

var _drawerLog = null;
var _drawerOpening = false;
function openDrawer(idx) {
  if (_drawerOpening) return;
  _drawerLog = _logsData[idx];
  if (!_drawerLog) return;
  document.getElementById('drawer-title').textContent = '['+esc(_drawerLog.key_alias||'-')+'] '+esc(_drawerLog.model||'-')+' - '+esc(_drawerLog.timestamp||'-');
  // 预渲染（防崩）
  try {
    document.getElementById('drawer-chat').innerHTML = renderChatView(_drawerLog);
  } catch(e) {
    document.getElementById('drawer-chat').innerHTML = '<div class="text-red-400 text-xs">渲染失败: '+esc(String(e))+'</div>';
  }
  document.getElementById('drawer-request').textContent = formatJson(_drawerLog.request_body)||'(空)';
  document.getElementById('drawer-response').textContent = formatJson(_drawerLog.response_body)||'(空)';
  switchDrawerTab('chat');
  document.getElementById('log-drawer-overlay').classList.remove('hidden');
  var drawer = document.getElementById('log-drawer');
  drawer.classList.remove('hidden');
  drawer.style.transform = 'translateX(100%)';
  _drawerOpening = true;
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      drawer.style.transform = 'translateX(0)';
      _drawerOpening = false;
    });
  });
}
function closeDrawer() {
  _drawerOpening = false;
  var drawer = document.getElementById('log-drawer');
  drawer.style.transform = 'translateX(100%)';
  setTimeout(function(){ drawer.classList.add('hidden'); document.getElementById('log-drawer-overlay').classList.add('hidden'); }, 250);
}
function switchDrawerTab(tab) {
  if (!_drawerLog) return;
  var tabs = {chat:'dtab-chat', request:'dtab-request', response:'dtab-response'};
  var views = {chat:'drawer-chat', request:'drawer-request', response:'drawer-response'};
  for (var k in tabs) {
    var tb = document.getElementById(tabs[k]);
    var vw = document.getElementById(views[k]);
    if (k === tab) {
      tb.className = 'flex-1 px-4 py-2 text-xs text-indigo-400 border-b-2 border-indigo-400 transition-colors cursor-pointer bg-surface/50';
      vw.classList.remove('hidden');
    } else {
      tb.className = 'flex-1 px-4 py-2 text-xs text-gray-400 border-b-2 border-transparent transition-colors cursor-pointer';
      vw.classList.add('hidden');
    }
  }
}

function renderChatView(log) {
  /* 将请求/响应解析为聊天气泡 HTML，兼容 chat/completions 和 responses 格式 */
  var html = '';
  var reqBody = null;

  // 1. 解析请求体
  try { reqBody = JSON.parse(log.request_body||'{}'); } catch(e) {}
  var msgs = [];

  if (reqBody) {
    // chat/completions 格式：直接取 messages
    if (reqBody.messages && reqBody.messages.length) {
      msgs = reqBody.messages;
    }
    // responses 格式：从 input + instructions 构造伪 messages
    else if (reqBody.input !== undefined || reqBody.instructions) {
      if (reqBody.instructions) {
        msgs.push({role: 'system', content: reqBody.instructions});
      }
      var input = reqBody.input;
      if (typeof input === 'string') {
        msgs.push({role: 'user', content: input});
      } else if (Array.isArray(input)) {
        input.forEach(function(item){
          if (item.role) {
            msgs.push({role: item.role, content: item.content || ''});
          } else if (item.type === 'input_text') {
            msgs.push({role: 'user', content: item.text || ''});
          }
        });
      }
    }
  }

  msgs.forEach(function(m){
    var role = m.role || 'user';
    var content = m.content || '';
    // content 可能是数组（responses 格式），提取文本
    if (Array.isArray(content)) {
      content = content.map(function(c){ return c.text || c.content || ''; }).join('');
    }
    var mdHtml = content ? marked.parse(String(content)) : '<span class="text-gray-500">(空)</span>';
    if (role === 'system' || role === 'developer') {
      html += '<div class="flex justify-center"><div class="bg-amber-950/30 border border-amber-800/50 rounded-lg px-3 py-2 text-xs text-amber-300/80 max-w-lg text-center italic chat-md">'+mdHtml+'</div></div>';
    } else if (role === 'user' || role === 'human') {
      html += '<div class="flex justify-end"><div class="bg-indigo-600/30 border border-indigo-500/40 rounded-2xl rounded-br-md px-4 py-2.5 text-sm text-gray-200 max-w-[80%] chat-md">'+mdHtml+'</div></div>';
    } else {
      html += '<div class="flex justify-start"><div class="bg-surface border border-border rounded-2xl rounded-bl-md px-4 py-2.5 text-sm text-gray-300 max-w-[80%] chat-md">'+mdHtml+'</div></div>';
    }
  });

  // 2. 解析响应体
  var respBody = null;
  try { respBody = JSON.parse(log.response_body||'{}'); } catch(e) {}
  var reasoning = '';
  var reply = '';

  if (respBody) {
    // chat/completions 格式
    if (respBody.choices && respBody.choices.length) {
      var msg = respBody.choices[0].message || respBody.choices[0].delta || {};
      reasoning = msg.reasoning_content || '';
      reply = msg.content || '';
    }
    // responses 格式：从 output 提取文本
    else if (respBody.output && respBody.output.length) {
      var outputTexts = [];
      respBody.output.forEach(function(item){
        // reasoning 项
        if (item.type === 'reasoning' && item.summary && item.summary.length) {
          item.summary.forEach(function(s){
            if (s.type === 'summary_text') reasoning += (reasoning ? '\n' : '') + s.text;
          });
        }
        // message 项
        if (item.type === 'message' && item.role === 'assistant' && item.content) {
          var contents = Array.isArray(item.content) ? item.content : [item.content];
          contents.forEach(function(c){
            if (c.type === 'output_text') outputTexts.push(c.text);
            else if (typeof c === 'string') outputTexts.push(c);
          });
        }
      });
      reply = outputTexts.join('\n');
    }
  }

  // SSE 流式响应解析
  if (!reply && !reasoning && log.response_body && log.response_body.indexOf('data:') >= 0) {
    var sseContent = '';
    var sseReasoning = '';
    var lines = log.response_body.split('\n');
    lines.forEach(function(line){
      line = line.trim();
      if (!line.startsWith('data: ') || line.startsWith('data: [DONE]')) return;
      try {
        var chunk = JSON.parse(line.substring(6));
        // chat/completions SSE 格式
        if (chunk.choices && chunk.choices[0]) {
          var delta = chunk.choices[0].delta || {};
          if (delta.content) sseContent += delta.content;
          if (delta.reasoning_content) sseReasoning += delta.reasoning_content;
        }
        // responses SSE 格式
        else if (chunk.type === 'response.output_text.delta') {
          sseContent += (chunk.delta || '');
        }
        else if (chunk.type === 'response.reasoning_summary_text.delta') {
          sseReasoning += (chunk.delta || '');
        }
      } catch(e) {}
    });
    reply = sseContent;
    reasoning = sseReasoning;
  }

  // 渲染思考过程
  if (reasoning) {
    html += '<details class="group"><summary class="text-xs text-amber-400/70 cursor-pointer hover:text-amber-300 select-none">💭 思考过程</summary><div class="mt-1 bg-amber-950/20 border border-amber-800/30 rounded-lg px-3 py-2 text-xs text-amber-300/70 whitespace-pre-wrap max-w-[90%]">'+esc(reasoning)+'</div></details>';
  }

  // 渲染回复
  if (reply) {
    html += '<div class="flex justify-start"><div class="bg-surface border border-indigo-500/30 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm text-gray-200 max-w-[80%] chat-md">'+marked.parse(String(reply))+'</div></div>';
  } else if (!reasoning && (respBody || log.response_body)) {
    var errCode = log.status_code || 0;
    var errMsg = esc(log.error||'');
    html += '<div class="flex justify-center"><div class="bg-red-950/40 border border-red-800/40 rounded-lg px-3 py-2 text-xs text-red-400">'+(errCode?'HTTP '+errCode+' ':'')+errMsg+'</div></div>';
  }

  // 3. 底部显示元信息（含 token 用量）
  var pt = log.prompt_tokens || 0;
  var ct = log.completion_tokens || 0;
  var cached = log.cached_tokens || 0;
  var tokenInfo = '';
  if (pt > 0 || ct > 0) {
    tokenInfo = ' &middot; 输入: ' + pt + (cached > 0 ? ' Token (缓存命中: ' + cached + ')' : ' Token') + ' &middot; 输出: ' + ct + ' Token';
  }
  html += '<div class="text-center pt-3"><span class="text-xs text-gray-600">'+esc(log.model||'-')+' &middot; '+(log.latency_ms||0)+'ms &middot; HTTP '+(log.status_code||'-')+ tokenInfo +'</span></div>';

  return html || '<div class="text-center text-gray-500 text-xs py-8">无对话数据</div>';
}

function loadProviders() {
  fetch('/api/keys').then(function(r){return r.json()}).then(function(keyJson){
    var aliases = [];
    (keyJson.data||[]).forEach(function(k){
      if (k.alias && aliases.indexOf(k.alias) === -1) aliases.push(k.alias);
    });
    aliases.sort();
    var container = document.getElementById('provider-options');
    var html = '';
    aliases.forEach(function(a){
      html += '<button onclick="selectAlias(\'' + esc(a) + '\')" data-alias="' + esc(a) + '" class="w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-surface-hover hover:text-white transition-colors cursor-pointer">' + esc(a) + '</button>';
    });
    container.innerHTML = html || '<div class="px-3 py-1.5 text-xs text-gray-500">暂无 Key</div>';
  }).catch(function(e){ console.error(e); });
}

function toggleProviderDropdown() {
  var menu = document.getElementById('provider-menu');
  var arrow = document.getElementById('provider-arrow');
  _providerDropdownOpen = !_providerDropdownOpen;
  if (_providerDropdownOpen) {
    menu.classList.remove('hidden');
    arrow.style.transform = 'rotate(180deg)';
  } else {
    menu.classList.add('hidden');
    arrow.style.transform = 'rotate(0deg)';
  }
}

function selectAlias(alias) {
  _currentAlias = alias;
  var label = document.getElementById('provider-label');
  label.textContent = alias || '全部 Key';

  var menu = document.getElementById('provider-menu');
  // 更新"全部 Key"按钮样式
  var allBtn = menu.querySelector('button[data-alias=""]');
  if (allBtn) {
    if (!alias) {
      allBtn.className = 'w-full text-left px-3 py-1.5 text-sm text-indigo-400 bg-indigo-400/10 hover:bg-surface-hover transition-colors cursor-pointer flex items-center justify-between';
      allBtn.innerHTML = '<span>全部 Key</span><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
    } else {
      allBtn.className = 'w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-surface-hover hover:text-white transition-colors cursor-pointer';
      allBtn.innerHTML = '<span>全部 Key</span>';
    }
  }
  // 更新具体 key 按钮
  var buttons = menu.querySelectorAll('button[data-alias]:not([data-alias=""])');
  buttons.forEach(function(btn){
    if (btn.getAttribute('data-alias') === alias) {
      btn.className = 'w-full text-left px-3 py-1.5 text-sm text-indigo-400 bg-indigo-400/10 hover:bg-surface-hover transition-colors cursor-pointer flex items-center justify-between';
      btn.innerHTML = '<span>' + esc(alias) + '</span><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
    } else {
      btn.className = 'w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-surface-hover hover:text-white transition-colors cursor-pointer';
      btn.innerHTML = esc(btn.getAttribute('data-alias'));
    }
  });

  var arrow = document.getElementById('provider-arrow');
  menu.classList.add('hidden');
  arrow.style.transform = 'rotate(0deg)';
  _providerDropdownOpen = false;

  saveFilters();
  refreshLogs(1);
}

function selectProvider(prov) {
  _currentProvider = prov;
  _currentAlias = '';  // 重置 alias 筛选
  var label = document.getElementById('provider-label');
  label.textContent = prov || '全部 Key';

  // 更新选中样式
  var menu = document.getElementById('provider-menu');
  var buttons = menu.querySelectorAll('button');
  buttons.forEach(function(btn){
    if (btn.getAttribute('data-provider') === prov) {
      btn.className = 'w-full text-left px-3 py-1.5 text-sm text-indigo-400 bg-indigo-400/10 hover:bg-surface-hover transition-colors cursor-pointer flex items-center justify-between';
      btn.innerHTML = '<span>' + esc(prov || '全部供应商') + '</span><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
    } else {
      btn.className = 'w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-surface-hover hover:text-white transition-colors cursor-pointer';
      btn.innerHTML = esc((btn.getAttribute('data-provider') || '全部供应商'));
    }
  });

  // 关闭下拉
  var arrow = document.getElementById('provider-arrow');
  menu.classList.add('hidden');
  arrow.style.transform = 'rotate(0deg)';
  _providerDropdownOpen = false;

  refreshLogs(1);
}

// 点击外部关闭下拉
document.addEventListener('click', function(e){
  if (_providerDropdownOpen && !document.getElementById('provider-dropdown').contains(e.target)) {
    toggleProviderDropdown();
  }
});

function toggleOrder() {
  _orderAsc = !_orderAsc;
  var btn = document.getElementById('btn-order');
  btn.textContent = _orderAsc ? '↑ 正序' : '↓ 倒序';
  saveFilters();
  refreshLogs(1);
}

function toggleHideEmpty() {
  _hideEmpty = !_hideEmpty;
  var t = document.getElementById('hide-empty-toggle');
  if (_hideEmpty) {
    t.classList.add('switch-on'); t.classList.remove('switch-off');
    t.querySelector('.switch-track').classList.replace('bg-gray-600','bg-indigo-600');
  } else {
    t.classList.remove('switch-on'); t.classList.add('switch-off');
    t.querySelector('.switch-track').classList.replace('bg-indigo-600','bg-gray-600');
  }
  saveFilters();
  refreshLogs(1);
}

function switchLogDays(d) {
  _currentDays = _currentDays === d ? 0 : d;
  [1,7,30].forEach(function(k){
    var btn = document.getElementById('btn-log-'+k+'d');
    if (k === _currentDays) {
      btn.className = 'bg-indigo-600 text-white text-xs px-3 py-1.5 rounded transition-colors cursor-pointer';
    } else {
      btn.className = 'bg-surface-light border border-border hover:border-indigo-500 text-gray-400 hover:text-gray-200 text-xs px-3 py-1.5 rounded transition-colors cursor-pointer';
    }
  });
  saveFilters();
  refreshLogs(1);
}

function toggleStatusFilter() {
  var labels = {success: '成功', failed: '失败'};
  var next = {success: 'failed', failed: 'success'};
  _statusFilter = next[_statusFilter];
  document.getElementById('btn-status').textContent = labels[_statusFilter];
  saveFilters();
  refreshLogs(1);
}

document.addEventListener('DOMContentLoaded', function() {
  loadFilters();

  // 同步状态筛选按钮
  document.getElementById('btn-status').textContent = _statusFilter === 'success' ? '成功' : '失败';

  // 同步排序按钮
  document.getElementById('btn-order').textContent = _orderAsc ? '↑ 正序' : '↓ 倒序';

  // 同步仅对话开关
  if (!_hideEmpty) {
    var t = document.getElementById('hide-empty-toggle');
    t.classList.remove('switch-on'); t.classList.add('switch-off');
    t.querySelector('.switch-track').classList.replace('bg-indigo-600','bg-gray-600');
  }

  // 同步时间范围按钮
  [1,7,30].forEach(function(k){
    var btn = document.getElementById('btn-log-'+k+'d');
    if (k === _currentDays) {
      btn.className = 'bg-indigo-600 text-white text-xs px-3 py-1.5 rounded transition-colors cursor-pointer';
    } else {
      btn.className = 'bg-surface-light border border-border hover:border-indigo-500 text-gray-400 hover:text-gray-200 text-xs px-3 py-1.5 rounded transition-colors cursor-pointer';
    }
  });

  // 恢复 Key 筛选标签
  if (_currentAlias) {
    document.getElementById('provider-label').textContent = _currentAlias;
  }

  document.getElementById('auto-refresh-toggle').addEventListener('click', toggleAutoRefresh);
  document.addEventListener('keydown', function(e) { if (e.key==='Escape') closeDrawer(); });
  // 调试：确认 JS 加载
  var cnt = document.getElementById('log-count');
  if (cnt) cnt.textContent = '加载中...';
  loadProviders();
  refreshLogs(1);
});
</script>
{% endblock %}
