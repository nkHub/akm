{% extends "_layout.html" %}
{% block content %}
<script src="/static/json-viewer.js"></script>
<script src="/static/chat-viewer.js"></script>
<div class="flex items-center justify-between mb-4 flex-wrap gap-3">
  <div class="flex items-center gap-3">
    <!-- 自定义供应商下拉 -->
    <div class="relative" id="provider-dropdown">
      <button onclick="toggleProviderDropdown()"
              class="flex items-center justify-between gap-2 bg-surface-light border border-border hover:border-indigo-500 text-gray-300 text-sm rounded px-3 py-1.5 transition-colors cursor-pointer min-w-[140px]">
        <span id="provider-label">全部 Key</span>
        <svg class="w-3.5 h-3.5 text-gray-500 transition-transform" id="provider-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="provider-menu" class="hidden absolute top-full left-0 mt-1 w-48 bg-surface-light border border-border rounded-lg shadow-xl z-30 py-1 max-h-60 overflow-y-auto">
        <div class="px-3 py-1.5 text-xs text-gray-400">Key</div>
        <button onclick="selectAlias('')" data-alias=""
                class="w-full text-left px-3 py-1.5 text-sm text-indigo-400 bg-indigo-400/10 hover:bg-surface-hover transition-colors cursor-pointer flex items-center justify-between">
          <span>全部 Key</span>
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </button>
        <div id="provider-options"></div>
      </div>
    </div>
    <span id="log-count" class="text-xs text-gray-500"></span>
  </div>
  <div class="flex items-center gap-3">
    <akm-switch id="hide-empty-switch" label="仅对话"></akm-switch>
    <button onclick="toggleOrder()" id="btn-order" class="bg-surface-light border border-border hover:border-indigo-500 text-gray-300 text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">↓ 倒序</button>
    <button onclick="toggleStatusFilter()" id="btn-status" class="bg-surface-light border border-border hover:border-indigo-500 text-gray-300 text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">成功</button>
    <akm-range-tabs id="log-days"></akm-range-tabs>
    <label id="auto-refresh-toggle" class="flex items-center gap-2 cursor-pointer select-none">
      <akm-switch id="auto-refresh-switch" label="自动刷新"></akm-switch>
      <span class="text-xs text-gray-500">5s</span>
    </label>
    <button onclick="refreshLogs(1)" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">刷新</button>
  </div>
</div>
<script>
try {
  var savedLogFilters = JSON.parse(localStorage.getItem('akm_log_filters') || '{}');
  window.__akmInitialLogFilters = savedLogFilters;

  var savedStatus = savedLogFilters.status;
  if (savedStatus === 'success' || savedStatus === 'failed') {
    var statusButton = document.getElementById('btn-status');
    if (statusButton) {
      statusButton.textContent = savedStatus === 'success' ? '成功' : '失败';
    }
  }

  var savedOrderAsc = savedLogFilters.orderAsc === true;
  var orderButton = document.getElementById('btn-order');
  if (orderButton) {
    orderButton.textContent = savedOrderAsc ? '↑ 正序' : '↓ 倒序';
  }

  var hideEmptySwitch = document.getElementById('hide-empty-switch');
  if (hideEmptySwitch && savedLogFilters.hideEmpty === true && typeof hideEmptySwitch.setChecked === 'function') {
    hideEmptySwitch.setChecked(true);
  }

  if (savedLogFilters.alias) {
    var providerLabel = document.getElementById('provider-label');
    if (providerLabel) {
      providerLabel.textContent = savedLogFilters.alias;
    }
  }
} catch (e) {}
</script>
<div id="log-table-container" class="rounded-lg border border-border overflow-x-auto"></div>
<akm-empty-state id="log-empty" class="hidden text-center py-16 text-gray-500" message="暂无日志"></akm-empty-state>
<akm-pagination id="log-pagination" class="flex items-center justify-center gap-2 mt-4 hidden"></akm-pagination>
{% endblock %}

{% block extra_html %}
<div id="log-drawer-overlay" class="hidden fixed inset-0 z-40 bg-black/50" onclick="closeDrawer()"></div>
<div id="log-drawer" class="hidden fixed top-0 right-0 z-50 h-full w-full max-w-3xl bg-surface-light border-l border-border shadow-2xl flex flex-col" style="transform:translateX(100%); transition: transform 0.25s ease" style="transform:translateX(100%)">
  <div class="flex items-center justify-between px-4 py-3 border-b border-border shrink-0">
    <h3 id="drawer-title" class="text-sm font-semibold text-white"></h3>
    <button onclick="closeDrawer()" class="text-gray-400 hover:text-white transition-colors cursor-pointer">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="flex border-b border-border shrink-0">
    <button onclick="switchDrawerTab('chat')" id="dtab-chat" class="flex-1 px-4 py-2 text-xs text-indigo-400 border-b-2 border-indigo-400 transition-colors cursor-pointer bg-surface/50">对话视图</button>
    <button onclick="switchDrawerTab('request')" id="dtab-request" class="flex-1 px-4 py-2 text-xs text-gray-400 border-b-2 border-transparent transition-colors cursor-pointer">请求体</button>
    <button onclick="switchDrawerTab('response')" id="dtab-response" class="flex-1 px-4 py-2 text-xs text-gray-400 border-b-2 border-transparent transition-colors cursor-pointer">响应体</button>
  </div>
  <div class="flex-1 overflow-y-auto overflow-x-hidden p-4" id="drawer-content">
    <akm-chat-viewer id="drawer-chat" class="block"></akm-chat-viewer>
    <akm-json-viewer id="drawer-request" class="hidden block"></akm-json-viewer>
    <akm-json-viewer id="drawer-response" class="hidden block"></akm-json-viewer>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var _logsData = [];
var _totalLogs = 0;
var _pageSize = 10;
var _currentPage = 1;
var autoRefresh = false, refreshTimer = null;
var _currentProvider = '';
var _currentAlias = '';
var _providerDropdownOpen = false;
var _orderAsc = false;
var _hideEmpty = false;
var _statusFilter = 'success';  // success | failed
var _currentDays = 1;  // 0=全部, 默认1天
var _jsonViewerMaxTextLength = 600000;
var _chatLazyThreshold = 600000;
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatJson(s) { if(!s)return''; try{return JSON.stringify(JSON.parse(s),null,2);}catch{return s;} }

function mapConvWarningLabel(code) {
  var m = {
    'responses_include_not_fully_mapped': 'include 未完整映射',
    'responses_store_not_mapped': 'store 未映射',
    'responses_reasoning_summary_not_mapped': 'reasoning.summary 未映射',
    'responses_parallel_tool_calls_not_mapped': 'parallel_tool_calls 未映射'
  };
  return m[code] || code;
}

function formatConvWarnings(headers, log) {
  // 优先使用后端派生字段（单一字典源），前端仅做兜底。
  if (log && Array.isArray(log.conv_warning_labels) && log.conv_warning_labels.length) {
    return '转换提示: ' + log.conv_warning_labels.join('；');
  }
  if (!headers || typeof headers !== 'object') return '';
  var raw = headers['x-akm-conv-warnings'];
  if (!raw || typeof raw !== 'string') return '';
  var labels = raw.split(',').map(function(c){ return mapConvWarningLabel((c || '').trim()); }).filter(Boolean);
  if (!labels.length) return '';
  return '转换提示: ' + labels.join('；');
}

function formatSecurityWarnings(headers) {
  if (!headers || typeof headers !== 'object') return '';
  var raw = headers['x-akm-security'];
  if (!raw || typeof raw !== 'string') return '';
  var idx = raw.indexOf(':');
  if (idx < 0) return '安全事件: ' + raw;
  var action = raw.substring(0, idx);
  var reason = raw.substring(idx + 1);
  var actionLabel = action === 'warn' ? '告警' : (action === 'masked' || action === 'mask' ? '替换' : '拦截');
  return '安全事件: ' + actionLabel + '（规则: ' + reason + '）';
}

function renderJsonAsync(targetId, raw, logRef) {
  var el = document.getElementById(targetId);
  if (!el) return;
  if (_drawerLog !== logRef) return;
  // 超大内容直接短路：避免任何额外解析/组件内部状态开销，先保证可见反馈。
  var rawStr = raw === null || raw === undefined ? '' : String(raw);
  if (rawStr.length > _jsonViewerMaxTextLength) {
    if (typeof el.setRaw === 'function') {
      try {
        if (typeof el.setMaxTextLength === 'function') {
          el.setMaxTextLength(_jsonViewerMaxTextLength);
        }
        el.setRaw(rawStr);
        return;
      } catch (e) {
        // 组件异常时降级到纯文本提示，保证用户至少看到原因。
      }
    }
    el.innerHTML = '<div class="text-red-300 text-xs py-3">文本过长（' + rawStr.length.toLocaleString() + '），已停止渲染。</div>';
    return;
  }
  if (typeof el.setRaw === 'function') {
    if (typeof el.setMaxTextLength === 'function') {
      el.setMaxTextLength(_jsonViewerMaxTextLength);
    }
    el.setRaw(rawStr);
    return;
  }
  var fallbackRaw = rawStr;
  el.textContent = fallbackRaw.trim() === '' ? 'null' : fallbackRaw;
}

function renderChatAsync(logRef, force) {
  if (!logRef) return;
  var chatEl = document.getElementById('drawer-chat');
  if (!chatEl) return;
  if (_drawerLog !== logRef) return;
  if (logRef.__chatRendered) return;
  var reqLen = (logRef.request_body || '').length;
  // 超大请求体默认不自动渲染对话视图，避免主线程长时间阻塞，导致 tab 切换状态无法及时刷新。
  if (!force && reqLen > _chatLazyThreshold) {
    if (typeof chatEl.setLoading === 'function') {
      chatEl.setLoading('对话视图内容较大（' + reqLen.toLocaleString() + ' 字符），切换到请求/响应查看更稳定');
    }
    return;
  }
  logRef.__chatRendered = true;
  if (typeof chatEl.setLoading === 'function') chatEl.setLoading('加载中...');
  setTimeout(function() {
    if (_drawerLog !== logRef) return;
    try {
      if (typeof chatEl.setItems === 'function') {
        chatEl.setItems(buildChatItems(logRef));
      } else {
        chatEl.innerHTML = renderChatView(logRef);
      }
    } catch (e) {
      if (typeof chatEl.setLoading === 'function') chatEl.setLoading('渲染失败: ' + String(e));
      else chatEl.innerHTML = '<div class="text-red-400 text-xs">渲染失败: ' + esc(String(e)) + '</div>';
    }
  }, 0);
}

function buildChatItems(log) {
  var items = [];
  var headerLines = [];
  try {
    var reqHeaders = JSON.parse(log.request_headers || '{}');
    for (var hk in reqHeaders) headerLines.push(hk + ': ' + reqHeaders[hk]);
    var convTips = formatConvWarnings(reqHeaders, log);
    if (convTips) headerLines.push(convTips);
    var securityTips = formatSecurityWarnings(reqHeaders);
    if (securityTips) headerLines.push(securityTips);
  } catch (e) {}
  if (headerLines.length) {
    items.push({ role:'meta', html: '<span class="text-gray-500">' + esc(headerLines.join(' | ')) + '</span>' });
  }
  var reqBody = null;
  try { reqBody = JSON.parse(log.request_body || '{}'); } catch(e) {}
  var msgs = [];
  if (reqBody) {
    if (reqBody.messages && reqBody.messages.length) {
      msgs = reqBody.messages;
    } else if (reqBody.input !== undefined || reqBody.instructions) {
      if (reqBody.instructions) msgs.push({role:'system', content:reqBody.instructions});
      var input = reqBody.input;
      if (typeof input === 'string') msgs.push({role:'user', content:input});
      else if (Array.isArray(input)) {
        input.forEach(function(it){
          if (it.role) msgs.push({role:it.role, content:it.content || ''});
          else if (it.type === 'input_text') msgs.push({role:'user', content:it.text || ''});
        });
      }
    }
  }
  msgs.forEach(function(m){
    var content = m.content || '';
    if (Array.isArray(content)) content = content.map(function(c){ return c.text || c.content || ''; }).join('');
    items.push({ role: (m.role === 'system' || m.role === 'developer') ? 'system' : (m.role === 'user' || m.role === 'human' ? 'user' : 'assistant'), html: content ? marked.parse(String(content)) : '<span class="text-gray-500">(空)</span>' });
  });

  var respBody = null;
  try { respBody = JSON.parse(log.response_body || '{}'); } catch(e) {}
  var reasoning = '';
  var reply = '';
  if (respBody) {
    if (respBody.choices && respBody.choices.length) {
      var msg = respBody.choices[0].message || respBody.choices[0].delta || {};
      reasoning = msg.reasoning_content || '';
      reply = msg.content || '';
    } else if (respBody.output && respBody.output.length) {
      var out = [];
      respBody.output.forEach(function(it){
        if (it.type === 'reasoning' && it.summary && it.summary.length) {
          it.summary.forEach(function(s){ if (s.type === 'summary_text') reasoning += (reasoning ? '\n' : '') + s.text; });
        }
        if (it.type === 'message' && it.role === 'assistant' && it.content) {
          var arr = Array.isArray(it.content) ? it.content : [it.content];
          arr.forEach(function(c){ if (c.type === 'output_text') out.push(c.text); else if (typeof c === 'string') out.push(c); });
        }
      });
      reply = out.join('\n');
    }
  }
  if (!reply && !reasoning && log.response_body && log.response_body.indexOf('data:') >= 0) {
    var sseContent = '';
    var sseReason = '';
    (log.response_body.split('\n') || []).forEach(function(line){
      line = line.trim();
      if (!line.startsWith('data: ') || line.startsWith('data: [DONE]')) return;
      try {
        var ch = JSON.parse(line.substring(6));
        if (ch.choices && ch.choices[0]) {
          var d = ch.choices[0].delta || {};
          if (d.content) sseContent += d.content;
          if (d.reasoning_content) sseReason += d.reasoning_content;
        } else if (ch.type === 'response.output_text.delta') sseContent += (ch.delta || '');
        else if (ch.type === 'response.reasoning_summary_text.delta') sseReason += (ch.delta || '');
      } catch(e) {}
    });
    reply = sseContent;
    reasoning = sseReason;
  }
  if (reasoning) items.push({ role:'system', html: '<span class="text-amber-300">思考过程</span><br>' + esc(reasoning) });
  if (reply) items.push({ role:'assistant', html: marked.parse(String(reply)) });

  return items;
}

// 筛选状态持久化
var FILTER_KEY = 'akm_log_filters';
function saveFilters() {
  try {
    localStorage.setItem(FILTER_KEY, JSON.stringify({
      status: _statusFilter,
      alias: _currentAlias,
      days: _currentDays,
      hideEmpty: _hideEmpty,
      orderAsc: _orderAsc
    }));
  } catch(e) {}
}
function loadFilters() {
  if (window.__akmInitialLogFilters && typeof window.__akmInitialLogFilters === 'object') {
    var initial = window.__akmInitialLogFilters;
    if (initial.status) _statusFilter = initial.status;
    if (initial.days !== undefined) _currentDays = initial.days;
    if (initial.hideEmpty !== undefined) _hideEmpty = initial.hideEmpty;
    if (initial.orderAsc !== undefined) _orderAsc = initial.orderAsc;
    if (initial.alias !== undefined) _currentAlias = initial.alias;
    return;
  }
  try {
    var saved = JSON.parse(localStorage.getItem(FILTER_KEY) || '{}');
    if (saved.status) _statusFilter = saved.status;
    if (saved.days !== undefined) _currentDays = saved.days;
    if (saved.hideEmpty !== undefined) _hideEmpty = saved.hideEmpty;
    if (saved.orderAsc !== undefined) _orderAsc = saved.orderAsc;
    if (saved.alias !== undefined) _currentAlias = saved.alias;
  } catch(e) {}
}

function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  var t = document.getElementById('auto-refresh-switch');
  if (t && typeof t.setChecked === 'function') t.setChecked(autoRefresh);
  if (autoRefresh) refreshTimer = setInterval(function(){refreshLogs(_currentPage);}, 5000);
  else { clearInterval(refreshTimer); refreshTimer = null; }
}

async function refreshLogs(page) {
  _currentPage = page || 1;
  var offset = (_currentPage - 1) * _pageSize;
  var url = '/api/logs?limit=' + _pageSize + '&offset=' + offset;
  if (_currentProvider) url += '&provider=' + encodeURIComponent(_currentProvider);
  if (_currentAlias) url += '&key_alias=' + encodeURIComponent(_currentAlias);
  url += '&order=' + (_orderAsc ? 'ASC' : 'DESC');
  if (_hideEmpty) url += '&hide_empty=true';
  if (_statusFilter !== 'all') url += '&status=' + _statusFilter;
  if (_currentDays > 0) url += '&days=' + _currentDays;

  try {
    // 显示加载状态
    document.getElementById('log-table-container').innerHTML = '<div class="flex items-center justify-center py-16"><div class="flex items-center gap-2 text-gray-500 text-xs"><svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>加载中...</div></div>';
    var res = await fetch(url);
    var json = await res.json();
    _logsData = json.data || [];
    _totalLogs = json.total || 0;
    document.getElementById('log-count').textContent = '共 ' + _totalLogs + ' 条，第 ' + _currentPage + ' 页';
    renderLogTable();
    renderPagination();
  } catch(e) { console.error(e); }
}

function renderLogTable() {
  var container = document.getElementById('log-table-container');
  var empty = document.getElementById('log-empty');
  if (!_logsData.length) { container.innerHTML=''; empty.classList.remove('hidden'); document.getElementById('log-pagination').classList.add('hidden'); return; }
  empty.classList.add('hidden');

  var html = '<table class="w-full text-sm"><thead><tr class="bg-surface-light text-gray-400 text-xs"><th class="text-left px-4 py-2.5 font-medium w-40">时间</th><th class="text-left px-4 py-2.5 font-medium w-20">Alias</th><th class="text-left px-4 py-2.5 font-medium w-20">供应商</th><th class="text-left px-4 py-2.5 font-medium w-56">模型</th><th class="text-left px-4 py-2.5 font-medium w-28">来源</th><th class="text-center px-4 py-2.5 font-medium w-28">输入(缓存)</th><th class="text-center px-4 py-2.5 font-medium w-20">输出</th><th class="text-center px-4 py-2.5 font-medium w-20">状态</th><th class="text-right px-4 py-2.5 font-medium w-24">延迟</th><th class="text-center px-4 py-2.5 font-medium w-16">详情</th></tr></thead><tbody>';

  _logsData.forEach(function(log, i){
    // ── 从请求头中提取来源标签 ──
    var headers = {};
    try { headers = JSON.parse(log.request_headers || '{}'); } catch(e) {}
    var ua = (headers['user-agent'] || '').toLowerCase();
    var convWarnText = formatConvWarnings(headers, log);
    var convWarnBadge = convWarnText ? '<span class="ml-1 text-amber-400" title="' + esc(convWarnText) + '">⚠</span>' : '';
    var securityWarnText = formatSecurityWarnings(headers);
    var securityWarnBadge = securityWarnText ? '<span class="ml-1 text-red-400" title="' + esc(securityWarnText) + '">🛡</span>' : '';
    var flagsRaw = String(headers['x-akm-flags'] || '');
    var flags = flagsRaw.split(',').map(function(x){ return x.trim(); }).filter(Boolean);
    var hasCountTokensFallback = flagsRaw.split(',').map(function(x){ return x.trim(); }).indexOf('count_tokens_fallback') >= 0;
    var hasAdapterFallback = flags.indexOf('usage_fallback_adapter') >= 0;
    var hasEstimateFallback = flags.indexOf('usage_estimated_light') >= 0;
    var countTokensBadge = hasCountTokensFallback ? '<span class="ml-1 text-cyan-400" title="该条 token 由 messages/count_tokens 回填">CT</span>' : '';
    var adapterFallbackBadge = hasAdapterFallback ? '<span class="ml-1 text-emerald-400" title="该条 token 由适配器收尾 usage 回填">AF</span>' : '';
    var estimateFallbackBadge = hasEstimateFallback ? '<span class="ml-1 text-yellow-300" title="该条 token 为轻量估算值（非上游真实 usage）">EST</span>' : '';
    var sourceLabel = '-';
    var sourceClass = 'text-gray-600';
    if (ua.includes('opencode')) { sourceLabel = 'OpenCode'; sourceClass = 'text-teal-400'; }
    else if (ua.includes('claude-cli') || ua.includes('claude code')) { sourceLabel = 'Claude'; sourceClass = 'text-indigo-400'; }
    else if (ua.includes('codex')) { sourceLabel = 'Codex'; sourceClass = 'text-amber-400'; }
    else if (ua.includes('cursor')) { sourceLabel = 'Cursor'; sourceClass = 'text-purple-400'; }
    else if (ua.includes('curl')) { sourceLabel = 'curl'; sourceClass = 'text-gray-400'; }
    else if (ua.includes('python')) { sourceLabel = 'Python'; sourceClass = 'text-blue-400'; }
    else if (ua) { sourceLabel = ua.split('/')[0].substring(0, 12); sourceClass = 'text-gray-400'; }

    var code = log.status_code;
    var sc = 'status-err';
    if (code>=200&&code<300) sc='status-2xx'; else if(code>=400&&code<500) sc='status-4xx'; else if(code>=500) sc='status-5xx';
    var lat = log.latency_ms||0;
    var ds = lat>=1000?(lat/1000).toFixed(1)+'s':lat+'ms';
    var dc = lat>5000?'text-red-400':lat>2000?'text-yellow-400':'text-gray-400';
    var hasBody = log.request_body||log.response_body;
    var pt = log.prompt_tokens || 0;
    var ct = log.completion_tokens || 0;
    var cached = log.cached_tokens || 0;
    var effectivePrompt = pt - cached;
    var promptHtml = pt > 0 ? '<span class="text-gray-300">'+effectivePrompt.toLocaleString()+'</span>' + (cached > 0 ? ' <span class="text-teal-400">(R'+cached.toLocaleString()+')</span>' : '') : '<span class="text-gray-600">-</span>';
    var completionHtml = ct > 0 ? '<span class="text-gray-300">'+ct.toLocaleString()+'</span>' : '<span class="text-gray-600">-</span>';

    html += '<tr class="border-t border-border hover:bg-surface-hover"><td class="px-4 py-2.5 text-gray-400 whitespace-nowrap text-xs">'+esc(log.timestamp||'-')+'</td><td class="px-4 py-2.5 text-indigo-300 font-medium text-xs"><span class="inline-block max-w-[80px] truncate align-bottom">'+esc(log.key_alias||'-')+'</span></td><td class="px-4 py-2.5 text-gray-300 text-xs"><span class="inline-block max-w-[80px] truncate align-bottom">'+esc(log.provider||'-')+'</span></td><td class="px-4 py-2.5 text-gray-400 text-xs"><span class="inline-block max-w-[224px] truncate align-bottom">'+esc(log.model||'-')+'</span>'+convWarnBadge+securityWarnBadge+countTokensBadge+adapterFallbackBadge+estimateFallbackBadge+'</td><td class="px-4 py-2.5 text-xs '+sourceClass+'">'+esc(sourceLabel)+'</td><td class="px-4 py-2.5 text-center text-xs">'+promptHtml+'</td><td class="px-4 py-2.5 text-center text-xs">'+completionHtml+'</td><td class="px-4 py-2.5 text-center"><span class="inline-block px-2 py-0.5 rounded text-xs font-medium '+sc+'">'+(code||'ERR')+'</span></td><td class="px-4 py-2.5 text-right text-xs '+dc+'">'+ds+'</td><td class="px-4 py-2.5 text-center">'+(hasBody?'<button onclick="openDrawer('+i+')" class="text-gray-400 hover:text-indigo-400 transition-colors cursor-pointer"><svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>':'<span class="text-gray-600">-</span>')+'</td></tr>';
    if (log.error) html += '<tr class="border-t border-border bg-red-950/20"><td colspan="9" class="px-4 py-1.5 text-xs text-red-400">'+esc(log.error)+'</td></tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderPagination() {
  var totalPages = Math.ceil(_totalLogs / _pageSize);
  var pg = document.getElementById('log-pagination');
  if (!pg || typeof pg.renderPagination !== 'function') return;
  pg.renderPagination({
    totalPages: totalPages,
    currentPage: _currentPage,

    summary: '共 ' + totalPages + ' 页'
  });
}

var _drawerLog = null;
var _drawerOpening = false;
function openDrawer(idx) {
  if (_drawerOpening) return;
  _drawerLog = _logsData[idx];
  if (!_drawerLog) return;
  var currentLog = _drawerLog;
  var chatEl = document.getElementById('drawer-chat');
  var reqEl = document.getElementById('drawer-request');
  var respEl = document.getElementById('drawer-response');
  document.getElementById('log-drawer').setTitle('['+esc(_drawerLog.key_alias||'-')+'] '+esc(_drawerLog.model||'-')+' - '+esc(_drawerLog.timestamp||'-'));
  // 聊天视图改为延迟渲染：避免大请求体时阻塞主线程，导致 tab 切换看起来失效。
  currentLog.__chatRendered = false;
  currentLog.__reqRendered = false;
  currentLog.__respRendered = false;
  var reqLen = (currentLog.request_body || '').length;
  if (reqLen > _chatLazyThreshold) {
    chatEl.innerHTML = '<div class="text-gray-500 text-xs py-4 text-center">数据较大，切换到“对话视图”时再渲染</div>';
  } else {
    chatEl.innerHTML = '<div class="text-gray-500 text-xs py-4 text-center">加载中...</div>';
  }
  // 抽屉打开时先清空滚动与内容，避免看到上一次日志残留。
  if (typeof reqEl.setLoading === 'function') reqEl.setLoading(); else reqEl.textContent = '加载中...';
  if (typeof respEl.setLoading === 'function') respEl.setLoading(); else respEl.textContent = '加载中...';
  switchDrawerTab('chat');
  document.getElementById('drawer-content').scrollTop = 0;
  _drawerOpening = true;
  document.getElementById('log-drawer').open();
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      _drawerOpening = false;
    });
  });

  // 异步渲染请求/响应 JSON（失败时回退原始文本，空值显示 null）。
}
function closeDrawer() {
  _drawerOpening = false;
  var drawer = document.getElementById('log-drawer');
  drawer.close();
  setTimeout(function(){
    var chatEl = document.getElementById('drawer-chat');
    if (chatEl && typeof chatEl.clear === 'function') chatEl.clear(); else if (chatEl) chatEl.innerHTML = '';
    var reqEl = document.getElementById('drawer-request');
    var respEl = document.getElementById('drawer-response');
    if (reqEl && typeof reqEl.clear === 'function') reqEl.clear(); else if (reqEl) reqEl.textContent = '';
    if (respEl && typeof respEl.clear === 'function') respEl.clear(); else if (respEl) respEl.textContent = '';
    document.getElementById('drawer-content').scrollTop = 0;
    document.getElementById('drawer-request').scrollTop = 0;
    document.getElementById('drawer-response').scrollTop = 0;
    _drawerLog = null;
  }, 250);
}
function switchDrawerTab(tab) {
  // 不依赖 _drawerLog 状态，确保抽屉切换始终可执行。
  var tabs = {chat:'dtab-chat', request:'dtab-request', response:'dtab-response'};
  var views = {chat:'drawer-chat', request:'drawer-request', response:'drawer-response'};
  var active = views[tab] || views.chat;
  for (var k in tabs) {
    var tb = document.getElementById(tabs[k]);
    if (!tb) continue;
    tb.className = (k === tab)
      ? 'flex-1 px-4 py-2 text-xs text-indigo-400 border-b-2 border-indigo-400 transition-colors cursor-pointer bg-surface/50'
      : 'flex-1 px-4 py-2 text-xs text-gray-400 border-b-2 border-transparent transition-colors cursor-pointer';
  }
  for (var v in views) {
    var el = document.getElementById(views[v]);
    if (!el) continue;
    var show = views[v] === active;
    if (show) el.classList.remove('hidden'); else el.classList.add('hidden');
  }
  if (tab === 'chat') {
    renderChatAsync(_drawerLog, false);
  } else if (tab === 'request') {
    if (_drawerLog && !_drawerLog.__reqRendered) {
      // 先完成 tab 显隐，再异步触发 JSON 赋值，避免大文本处理阻塞导致 hidden 状态看起来未切换。
      var logRefReq = _drawerLog;
      _drawerLog.__reqRendered = true;
      setTimeout(function() {
        if (_drawerLog !== logRefReq) return;
        renderJsonAsync('drawer-request', logRefReq.request_body, logRefReq);
      }, 0);
    }
  } else if (tab === 'response') {
    if (_drawerLog && !_drawerLog.__respRendered) {
      var logRefResp = _drawerLog;
      _drawerLog.__respRendered = true;
      setTimeout(function() {
        if (_drawerLog !== logRefResp) return;
        renderJsonAsync('drawer-response', logRefResp.response_body, logRefResp);
      }, 0);
    }
  }
}

function renderChatView(log) {
  /* 将请求/响应解析为聊天气泡 HTML，兼容 chat/completions 和 responses 格式 */
  var html = '';
  var headerLines = [];
  try {
    var reqHeaders = JSON.parse(log.request_headers || '{}');
    for (var hk in reqHeaders) headerLines.push(hk + ': ' + reqHeaders[hk]);
    var convTips = formatConvWarnings(reqHeaders, log);
    if (convTips) headerLines.push(convTips);
  } catch (e) {}
  if (headerLines.length) {
    html += '<div class="text-xs text-gray-500 mb-3 break-all">' + esc(headerLines.join(' | ')) + '</div>';
  }
  var reqBody = null;

  // 1. 解析请求体
  try { reqBody = JSON.parse(log.request_body||'{}'); } catch(e) {}
  var msgs = [];

  if (reqBody) {
    // chat/completions 格式：直接取 messages
    if (reqBody.messages && reqBody.messages.length) {
      msgs = reqBody.messages;
    }
    // responses 格式：从 input + instructions 构造伪 messages
    else if (reqBody.input !== undefined || reqBody.instructions) {
      if (reqBody.instructions) {
        msgs.push({role: 'system', content: reqBody.instructions});
      }
      var input = reqBody.input;
      if (typeof input === 'string') {
        msgs.push({role: 'user', content: input});
      } else if (Array.isArray(input)) {
        input.forEach(function(item){
          if (item.role) {
            msgs.push({role: item.role, content: item.content || ''});
          } else if (item.type === 'input_text') {
            msgs.push({role: 'user', content: item.text || ''});
          }
        });
      }
    }
  }

  msgs.forEach(function(m){
    var role = m.role || 'user';
    var content = m.content || '';
    // content 可能是数组（responses 格式），提取文本
    if (Array.isArray(content)) {
      content = content.map(function(c){ return c.text || c.content || ''; }).join('');
    }
    var mdHtml = content ? marked.parse(String(content)) : '<span class="text-gray-500">(空)</span>';
    if (role === 'system' || role === 'developer') {
      html += '<div class="flex justify-center"><div class="bg-amber-950/30 border border-amber-800/50 rounded-lg px-3 py-2 text-xs text-amber-300/80 max-w-lg text-center italic chat-md">'+mdHtml+'</div></div>';
    } else if (role === 'user' || role === 'human') {
      html += '<div class="flex justify-end"><div class="bg-indigo-600/30 border border-indigo-500/40 rounded-2xl rounded-br-md px-4 py-2.5 text-sm text-gray-200 max-w-[80%] chat-md">'+mdHtml+'</div></div>';
    } else {
      html += '<div class="flex justify-start"><div class="bg-surface border border-border rounded-2xl rounded-bl-md px-4 py-2.5 text-sm text-gray-300 max-w-[80%] chat-md">'+mdHtml+'</div></div>';
    }
  });

  // 2. 解析响应体
  var respBody = null;
  try { respBody = JSON.parse(log.response_body||'{}'); } catch(e) {}
  var reasoning = '';
  var reply = '';

  if (respBody) {
    // chat/completions 格式
    if (respBody.choices && respBody.choices.length) {
      var msg = respBody.choices[0].message || respBody.choices[0].delta || {};
      reasoning = msg.reasoning_content || '';
      reply = msg.content || '';
    }
    // responses 格式：从 output 提取文本
    else if (respBody.output && respBody.output.length) {
      var outputTexts = [];
      respBody.output.forEach(function(item){
        // reasoning 项
        if (item.type === 'reasoning' && item.summary && item.summary.length) {
          item.summary.forEach(function(s){
            if (s.type === 'summary_text') reasoning += (reasoning ? '\n' : '') + s.text;
          });
        }
        // message 项
        if (item.type === 'message' && item.role === 'assistant' && item.content) {
          var contents = Array.isArray(item.content) ? item.content : [item.content];
          contents.forEach(function(c){
            if (c.type === 'output_text') outputTexts.push(c.text);
            else if (typeof c === 'string') outputTexts.push(c);
          });
        }
      });
      reply = outputTexts.join('\n');
    }
  }

  // SSE 流式响应解析
  if (!reply && !reasoning && log.response_body && log.response_body.indexOf('data:') >= 0) {
    var sseContent = '';
    var sseReasoning = '';
    var lines = log.response_body.split('\n');
    lines.forEach(function(line){
      line = line.trim();
      if (!line.startsWith('data: ') || line.startsWith('data: [DONE]')) return;
      try {
        var chunk = JSON.parse(line.substring(6));
        // chat/completions SSE 格式
        if (chunk.choices && chunk.choices[0]) {
          var delta = chunk.choices[0].delta || {};
          if (delta.content) sseContent += delta.content;
          if (delta.reasoning_content) sseReasoning += delta.reasoning_content;
        }
        // responses SSE 格式
        else if (chunk.type === 'response.output_text.delta') {
          sseContent += (chunk.delta || '');
        }
        else if (chunk.type === 'response.reasoning_summary_text.delta') {
          sseReasoning += (chunk.delta || '');
        }
      } catch(e) {}
    });
    reply = sseContent;
    reasoning = sseReasoning;
  }

  // 渲染思考过程
  if (reasoning) {
    html += '<details class="group"><summary class="text-xs text-amber-400/70 cursor-pointer hover:text-amber-300 select-none">💭 思考过程</summary><div class="mt-1 bg-amber-950/20 border border-amber-800/30 rounded-lg px-3 py-2 text-xs text-amber-300/70 whitespace-pre-wrap max-w-[90%]">'+esc(reasoning)+'</div></details>';
  }

  // 渲染回复
  if (reply) {
    html += '<div class="flex justify-start"><div class="bg-surface border border-indigo-500/30 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm text-gray-200 max-w-[80%] chat-md">'+marked.parse(String(reply))+'</div></div>';
  } else if (!reasoning && (respBody || log.response_body)) {
    var errCode = log.status_code || 0;
    var errMsg = esc(log.error||'');
    html += '<div class="flex justify-center"><div class="bg-red-950/40 border border-red-800/40 rounded-lg px-3 py-2 text-xs text-red-400">'+(errCode?'HTTP '+errCode+' ':'')+errMsg+'</div></div>';
  }

  return html || '<div class="text-center text-gray-500 text-xs py-8">无对话数据</div>';
}

function loadProviders() {
  fetch('/api/keys').then(function(r){return r.json()}).then(function(keyJson){
    var aliases = [];
    (keyJson.data||[]).forEach(function(k){
      if (k.alias && aliases.indexOf(k.alias) === -1) aliases.push(k.alias);
    });
    aliases.sort();
    var container = document.getElementById('provider-options');
    var html = '';
    aliases.forEach(function(a){
      html += '<button onclick="selectAlias(\'' + esc(a) + '\')" data-alias="' + esc(a) + '" class="w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-surface-hover hover:text-white transition-colors cursor-pointer">' + esc(a) + '</button>';
    });
    container.innerHTML = html || '<div class="px-3 py-1.5 text-xs text-gray-500">暂无 Key</div>';

    // 恢复已保存的 Key 选中样式
    if (_currentAlias) {
      var allBtn = document.getElementById('provider-menu').querySelector('button[data-alias=""]');
      if (allBtn) {
        allBtn.className = 'w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-surface-hover hover:text-white transition-colors cursor-pointer';
        allBtn.innerHTML = '<span>全部 Key</span>';
      }
      var btns = container.querySelectorAll('button[data-alias]');
      btns.forEach(function(b){
        if (b.getAttribute('data-alias') === _currentAlias) {
          b.className = 'w-full text-left px-3 py-1.5 text-sm text-indigo-400 bg-indigo-400/10 hover:bg-surface-hover transition-colors cursor-pointer flex items-center justify-between';
          b.innerHTML = '<span>' + esc(_currentAlias) + '</span><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
        }
      });
    }
  }).catch(function(e){ console.error(e); });
}

  var menu = document.getElementById('provider-menu');

      { value: 30, label: '30天' }
    ], _currentDays, 'switchLogDays');

  // 恢复 Key 筛选标签

    document.getElementById('provider-label').textContent = _currentAlias;

  document.getElementById('auto-refresh-switch').addEventListener('change', toggleAutoRefresh);

  document.addEventListener('keydown', function(e) { if (e.key==='Escape') closeDrawer(); });
  // 调试：确认 JS 加载
  var cnt = document.getElementById('log-count');
  if (cnt) cnt.textContent = '加载中...';
  loadProviders();
  refreshLogs(1);
});
