{% extends "_layout.html" %}
{% block content %}
<div class="space-y-4">
  <!-- 第一行：启动开关 + 服务端口 -->
  <div class="grid grid-cols-2 gap-4">
    <div class="bg-surface-light border border-border rounded-lg p-5">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-sm font-semibold text-white">启动时打开管理台</h3>
          <p class="text-xs text-gray-500 mt-1">菜单栏应用启动后自动在浏览器打开管理页面</p>
        </div>
        <label id="cfg-auto-open" class="flex items-center cursor-pointer select-none switch-off">
          <div class="switch-track bg-gray-600 flex items-center"><div class="switch-thumb bg-white"></div></div>
        </label>
      </div>
    </div>

    <div class="bg-surface-light border border-border rounded-lg p-5">
      <h3 class="text-sm font-semibold text-white mb-2">服务端口</h3>
      <p class="text-xs text-gray-500 mb-3">修改后需在菜单栏「重启服务」生效</p>
      <div class="flex items-center gap-3">
        <input id="server-port" type="number" value="8800" min="1024" max="65535"
               class="w-24 bg-surface border border-border rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
        <button onclick="savePort()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">保存</button>
      </div>
      <p id="port-msg" class="text-xs text-emerald-400 mt-2 hidden"></p>
    </div>
  </div>

  <!-- 第二行：日志保留 + 清空日志 -->
  <div class="grid grid-cols-2 gap-4">
    <div class="bg-surface-light border border-border rounded-lg p-5">
      <h3 class="text-sm font-semibold text-white mb-2">日志保留天数</h3>
      <p class="text-xs text-gray-500 mb-3">超过天数的审计日志将被自动清理</p>
      <div class="flex items-center gap-3">
        <input id="retention-days" type="number" value="30" min="1" max="365"
               class="w-24 bg-surface border border-border rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
        <span class="text-xs text-gray-400">天</span>
        <button onclick="saveRetention()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">保存</button>
      </div>
      <p id="retention-msg" class="text-xs text-emerald-400 mt-2 hidden"></p>
    </div>

    <div class="bg-surface-light border border-border rounded-lg p-5">
      <h3 class="text-sm font-semibold text-white mb-2">清空日志</h3>
      <p class="text-xs text-gray-500 mb-3">删除所有审计日志，此操作不可撤销</p>
      <button onclick="cleanLogs()" class="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1.5 rounded transition-colors cursor-pointer">清空全部日志</button>
      <p id="clean-msg" class="text-xs mt-2 hidden"></p>
    </div>
  </div>

  <!-- 日志统计 -->
  <div class="bg-surface-light border border-border rounded-lg p-5">
    <h3 class="text-sm font-semibold text-white mb-1">日志统计</h3>
    <div id="log-stats" class="text-xs text-gray-400 mt-2">加载中...</div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var _autoOpen = true;

function loadConfig() {
  fetch('/api/config').then(function(r){return r.json()}).then(function(cfg){
    _autoOpen = cfg.auto_open_admin !== false;
    updateAutoOpenToggle();
    document.getElementById('retention-days').value = cfg.log_retention_days || 30;
    document.getElementById('server-port').value = cfg.server_port || 8800;
    loadLogStats();
  }).catch(function(){
    loadLogStats();
  });
}

function updateAutoOpenToggle() {
  var toggle = document.getElementById('cfg-auto-open');
  var track = toggle.querySelector('.switch-track');
  if (_autoOpen) {
    toggle.classList.add('switch-on'); toggle.classList.remove('switch-off');
    track.classList.remove('bg-gray-600'); track.classList.add('bg-indigo-600');
  } else {
    toggle.classList.remove('switch-on'); toggle.classList.add('switch-off');
    track.classList.add('bg-gray-600'); track.classList.remove('bg-indigo-600');
  }
}

function toggleAutoOpen() {
  _autoOpen = !_autoOpen;
  updateAutoOpenToggle();
  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({auto_open_admin: _autoOpen})
  });
}

function loadLogStats() {
  fetch('/api/logs?limit=1&offset=0').then(function(r){return r.json()}).then(function(json){
    document.getElementById('log-stats').textContent = '共 ' + json.total.toLocaleString() + ' 条审计日志';
  }).catch(function(){ document.getElementById('log-stats').textContent = '加载失败'; });
}

function saveRetention() {
  var days = document.getElementById('retention-days').value;
  var msg = document.getElementById('retention-msg');
  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({log_retention_days: parseInt(days) || 30})
  }).then(function(){
    msg.textContent = '已保存：日志保留 ' + days + ' 天';
    msg.classList.remove('hidden');
    setTimeout(function(){ msg.classList.add('hidden'); }, 3000);
  });
}

function savePort() {
  var port = parseInt(document.getElementById('server-port').value) || 8800;
  var msg = document.getElementById('port-msg');
  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({server_port: port})
  }).then(function(){
    msg.textContent = '已保存，请在菜单栏「重启服务」使端口生效';
    msg.classList.remove('hidden');
    setTimeout(function(){ msg.classList.add('hidden'); }, 5000);
  });
}

function cleanLogs() {
  if (!confirm('确认删除所有审计日志？此操作不可撤销。')) return;
  // 传明天的日期确保所有日志（包括今天的）都被清理
  var tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  var before = tomorrow.toISOString().slice(0, 10);
  fetch('/api/logs/clean', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({before: before})
  }).then(function(r){ return r.json(); }).then(function(data){
    var msg = document.getElementById('clean-msg');
    msg.textContent = '已清理 ' + (data.deleted || 0) + ' 条日志';
    msg.className = 'text-xs text-emerald-400 mt-2';
    msg.classList.remove('hidden');
    loadLogStats();
  }).catch(function(e){
    var msg = document.getElementById('clean-msg');
    msg.textContent = '清空失败: ' + e.message;
    msg.className = 'text-xs text-red-400 mt-2';
    msg.classList.remove('hidden');
  });
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('cfg-auto-open').addEventListener('click', toggleAutoOpen);
  loadConfig();
});
</script>
{% endblock %}
